<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Progress Tracker | Possibility Strategy</title>
<style>
:root{
  --bg:#FAF8F5;
  --bg-elevated:#FFFFFF;
  --card:#FFFFFF;
  --card-hover:#FAFAFA;
  --border:rgba(26,20,16,0.06);
  --border-strong:rgba(26,20,16,0.1);
  --text:#1A1410;
  --t2:rgba(26,20,16,0.62);
  --t3:rgba(26,20,16,0.38);
  --teal:#2E9E9E;
  --teal-bright:#33A3A3;
  --teal-soft:rgba(51,163,163,0.07);
  --teal-hover:rgba(51,163,163,0.04);
  --align:#6366F1;
  --align-soft:rgba(99,102,241,0.06);
  --become:#34D399;
  --become-soft:rgba(52,211,153,0.06);
  --release:#E8758A;
  --red:#EF4444;
  --green:#22C55E;
  --amber:#F59E0B;
  --orange:#F97316;
  --r:14px;
  --r-sm:10px;
  --r-xs:8px;
  --shadow-xs:0 1px 2px rgba(0,0,0,0.03);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.03), 0 2px 8px rgba(0,0,0,0.03);
  --shadow-md:0 2px 6px rgba(0,0,0,0.03), 0 6px 20px rgba(0,0,0,0.05);
  --shadow-lg:0 4px 12px rgba(0,0,0,0.04), 0 12px 40px rgba(0,0,0,0.07);
  --zen:cubic-bezier(0.22,1,0.36,1);
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
  --focus-ring:0 0 0 3px rgba(51,163,163,0.08);
  --focus-border:rgba(51,163,163,0.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
::selection{background:rgba(51,163,163,0.18);color:var(--text)}
html{height:-webkit-fill-available;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:-webkit-fill-available;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
  padding-left:var(--safe-left);
  padding-right:var(--safe-right);
  transition:background 0.3s ease, color 0.3s ease;
}
/* Smooth theme transitions after load (no FOUC) */
body.loaded .hero-header,
body.loaded .milestone-card,
body.loaded .ai-card,
body.loaded .burndown-card,
body.loaded .p-stat,
body.loaded .filter-pill,
body.loaded .task,
body.loaded .toast,
body.loaded .cmd-panel,
body.loaded .kb-panel{
  transition:background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, color 0.3s ease;
}

/* Auth overlay */
.auth-gate{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
}
.auth-gate .brand{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal)}
.auth-gate .title{font-size:22px;font-weight:800;letter-spacing:-0.5px}

/* ===== HERO HEADER ===== */
.hero-header{
  background:linear-gradient(180deg, rgba(46,158,158,0.035) 0%, var(--bg) 100%);
  padding:0 24px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
}
.hero-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0 0;
  max-width:800px;margin:0 auto;
}
.hero-left{display:flex;flex-direction:column;gap:1px}
.hero-brand{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal)}
.hero-title{font-size:20px;font-weight:800;letter-spacing:-0.6px}
.hero-actions{display:flex;gap:6px;align-items:center}
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--t2);transition:all 0.2s var(--zen);
  font-family:inherit;-webkit-tap-highlight-color:transparent;
  position:relative;
}
.icon-btn:hover{background:var(--teal-hover);color:var(--teal);border-color:rgba(51,163,163,0.15)}
.icon-btn:active{transform:scale(0.92)}
.icon-btn svg{width:16px;height:16px;display:block}

/* ===== PROGRESS RING ===== */
.progress-ring-wrap{
  display:flex;align-items:center;gap:16px;
  padding:12px 0 14px;
  max-width:800px;margin:0 auto;
}
.progress-ring-container{position:relative;width:72px;height:72px;flex-shrink:0}
.progress-ring-container svg{width:72px;height:72px;transform:rotate(-90deg)}
.progress-ring-bg{fill:none;stroke:var(--border);stroke-width:5}
.progress-ring-fill{
  fill:none;stroke:url(#tealGrad);stroke-width:5;
  stroke-linecap:round;
  transition:stroke-dashoffset 1s var(--zen);
  will-change:stroke-dashoffset;
}
.progress-ring-text{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.progress-ring-pct{font-size:18px;font-weight:800;color:var(--teal);line-height:1;font-variant-numeric:tabular-nums}
.progress-ring-label{font-size:8px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px}
.progress-stats{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;min-width:0}
.p-stat{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:10px 12px;
  display:flex;flex-direction:column;gap:3px;
  min-height:54px;justify-content:center;
}
.p-stat-num{font-size:20px;font-weight:800;letter-spacing:-0.5px;line-height:1;font-variant-numeric:tabular-nums}
.p-stat-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px}
.p-stat.teal .p-stat-num{color:var(--teal)}
.p-stat.green .p-stat-num{color:var(--green)}
.p-stat.amber .p-stat-num{color:var(--amber)}
.p-stat.red .p-stat-num{color:var(--red)}
.p-stat.align .p-stat-num{color:var(--align)}

/* ===== AI INSIGHTS PANEL ===== */
.ai-panel{
  max-width:800px;margin:0 auto;padding:0 24px;
}
.ai-card{
  background:linear-gradient(135deg, rgba(46,158,158,0.025) 0%, rgba(99,102,241,0.015) 100%);
  border:1px solid rgba(46,158,158,0.1);
  border-radius:var(--r);padding:16px 18px;
  margin-bottom:16px;
}
.ai-header{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.ai-icon{
  width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg, var(--teal), var(--align));
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 2px 8px rgba(46,158,158,0.2);
}
.ai-icon svg{width:13px;height:13px;color:#fff}
.ai-title{font-size:13px;font-weight:700;letter-spacing:-0.2px}
.ai-subtitle{font-size:10px;color:var(--t3);margin-left:auto;font-weight:500}
.ai-insights{display:flex;flex-direction:column;gap:6px}
.ai-insight{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;
  background:var(--card);border-radius:var(--r-xs);
  border:1px solid var(--border);
  transition:border-color 0.15s;
}
.ai-insight:hover{border-color:var(--border-strong)}
.ai-insight-icon{
  width:24px;height:24px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:12px;margin-top:1px;
}
.ai-insight-icon.velocity{background:rgba(51,163,163,0.08);color:var(--teal)}
.ai-insight-icon.risk{background:rgba(239,68,68,0.06);color:var(--red)}
.ai-insight-icon.prediction{background:rgba(99,102,241,0.06);color:var(--align)}
.ai-insight-icon.effort{background:rgba(245,158,11,0.06);color:var(--amber)}
.ai-insight-icon.streak{background:rgba(52,211,153,0.06);color:var(--green)}
.ai-insight-body{flex:1;min-width:0}
.ai-insight-title{font-size:12px;font-weight:700;line-height:1.35;letter-spacing:-0.1px}
.ai-insight-desc{font-size:12px;color:var(--t2);line-height:1.45;margin-top:2px}
.ai-toggle{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:100px;
  border:1px solid rgba(46,158,158,0.12);
  background:transparent;color:var(--teal);
  font-size:11px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:all 0.2s var(--zen);
  margin-bottom:12px;max-width:800px;margin-left:auto;margin-right:auto;
  -webkit-tap-highlight-color:transparent;
}
.ai-toggle:hover{background:var(--teal-hover)}
.ai-toggle svg{width:14px;height:14px}
.ai-panel.collapsed .ai-card{display:none}

/* Launch date alert banner */
.launch-alert{
  max-width:800px;margin:0 auto;padding:0 24px;
}
.launch-alert-inner{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  background:rgba(239,68,68,0.04);
  border:1px solid rgba(239,68,68,0.12);
  border-radius:var(--r-sm);margin-bottom:12px;
  flex-wrap:wrap;
}
.launch-alert-inner .alert-text{flex:1;font-size:13px;font-weight:600;color:var(--red);min-width:150px;line-height:1.4}
.launch-alert-inner .alert-icon{font-size:15px;flex-shrink:0;line-height:1}
.launch-alert-inner input[type="date"]{
  border:1px solid rgba(239,68,68,0.15);border-radius:var(--r-xs);
  padding:6px 10px;font-size:13px;font-family:inherit;
  color:var(--text);background:var(--card);outline:none;min-height:32px;
}
.launch-alert-inner input[type="date"]:focus{border-color:var(--focus-border);box-shadow:var(--focus-ring)}
.launch-alert-inner .save-btn{
  padding:6px 14px;border-radius:var(--r-xs);
  border:none;background:var(--red);color:#fff;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:inherit;min-height:32px;transition:all 0.2s var(--zen);
}
.launch-alert-inner .save-btn:hover{background:#DC2626}

/* Config bar */
.config-bar{
  max-height:0;overflow:hidden;
  transition:max-height 0.3s var(--zen);
  border-bottom:1px solid var(--border);
}
.config-bar.open{max-height:80px}
.config-inner{
  display:flex;align-items:center;gap:12px;
  padding:12px 24px;
  max-width:800px;margin:0 auto;
}
.config-label{font-size:13px;color:var(--t2);font-weight:600}
.config-input{
  border:1px solid var(--border);border-radius:var(--r-xs);
  padding:8px 12px;font-size:14px;font-family:inherit;
  background:var(--card);color:var(--text);
  outline:none;min-height:36px;
}
.config-input:focus{border-color:var(--focus-border);box-shadow:var(--focus-ring)}
.save-btn{
  padding:8px 18px;border-radius:var(--r-xs);
  border:none;background:var(--teal);color:#fff;
  font-size:13px;font-weight:700;cursor:pointer;
  font-family:inherit;min-height:36px;
  transition:all 0.2s var(--zen);
  letter-spacing:-0.1px;
}
.save-btn:hover{background:var(--teal-bright)}
.save-btn:active{transform:scale(0.97)}

/* Expand all */
.toolbar{
  display:flex;align-items:center;justify-content:flex-end;gap:8px;
  max-width:800px;margin:0 auto;padding:0 0 8px;
}
.toolbar-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:100px;
  border:1px solid var(--border);background:transparent;
  color:var(--t3);font-size:11px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all 0.15s var(--zen);
  -webkit-tap-highlight-color:transparent;
}
.toolbar-btn:hover{background:var(--teal-hover);color:var(--teal);border-color:rgba(51,163,163,0.12)}
.toolbar-btn:active{transform:scale(0.97)}
.toolbar-btn svg{width:12px;height:12px}

/* ===== FILTER BAR ===== */
.filter-bar{
  display:flex;gap:6px;padding:0 0 10px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  max-width:800px;margin:0 auto;
}
.filter-bar::-webkit-scrollbar{display:none}
.filter-pill{
  padding:6px 14px;border-radius:100px;
  border:1px solid var(--border);
  background:transparent;color:var(--t2);
  font-size:12px;font-weight:600;
  cursor:pointer;white-space:nowrap;
  transition:all 0.15s var(--zen);
  font-family:inherit;min-height:32px;
  -webkit-tap-highlight-color:transparent;
  display:inline-flex;align-items:center;
}
.filter-pill:hover{border-color:var(--border-strong);color:var(--text)}
.filter-pill:active{transform:scale(0.97)}
.filter-pill.on{background:var(--text);color:#fff;border-color:transparent;font-weight:700}
.filter-pill .cnt{font-size:10px;opacity:0.55;margin-left:4px;font-variant-numeric:tabular-nums}

/* ===== MAIN ===== */
.main{max-width:800px;margin:0 auto;padding:20px 24px 120px}

/* ===== TIMELINE ===== */
.timeline{position:relative}
.timeline::before{
  content:'';position:absolute;left:16px;top:24px;bottom:24px;
  width:2px;border-radius:1px;
  background:linear-gradient(180deg, var(--teal), rgba(46,158,158,0.08));
}

/* ===== MILESTONE CARD ===== */
.milestone{
  position:relative;margin-bottom:16px;
  padding-left:48px;
  opacity:0;transform:translateY(8px);
  animation:fadeSlideIn 0.35s var(--zen) forwards;
}
.milestone:nth-child(1){animation-delay:0s}
.milestone:nth-child(2){animation-delay:0.04s}
.milestone:nth-child(3){animation-delay:0.08s}
.milestone:nth-child(4){animation-delay:0.12s}
.milestone:nth-child(5){animation-delay:0.16s}
.milestone:nth-child(6){animation-delay:0.2s}
.milestone:nth-child(7){animation-delay:0.24s}
@keyframes fadeSlideIn{to{opacity:1;transform:translateY(0)}}

.milestone-dot{
  position:absolute;left:8px;top:22px;
  width:18px;height:18px;border-radius:50%;
  background:var(--card);border:2.5px solid var(--teal);
  z-index:2;transition:all 0.35s var(--zen);
  box-shadow:0 0 0 3px var(--bg);
}
.milestone-dot.complete{
  background:var(--teal);border-color:var(--teal);
  box-shadow:0 0 0 3px var(--bg), 0 0 10px rgba(46,158,158,0.25);
}
.milestone-dot.complete::after{
  content:'';position:absolute;inset:3px;
  border-radius:50%;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='20 6 9 17 4 12'/%3E%3C/svg%3E") center/70% no-repeat;
}

.milestone-card{
  background:var(--card);
  border-radius:var(--r);
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  overflow:hidden;
  transition:box-shadow 0.25s var(--zen), transform 0.25s var(--zen);
  will-change:transform;
}
.milestone-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.milestone.expanded .milestone-card{box-shadow:var(--shadow-md);border-color:var(--border-strong)}

.milestone-header{
  padding:16px 18px 14px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.milestone-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.milestone-title{
  font-size:15px;font-weight:700;letter-spacing:-0.3px;
  flex:1;line-height:1.35;
}
.milestone-title[contenteditable]{outline:none;border-radius:4px;padding:2px 4px;margin:-2px -4px}
.milestone-title[contenteditable]:focus{background:rgba(51,163,163,0.04);box-shadow:inset 0 0 0 1px var(--focus-border)}
.milestone-actions{
  display:flex;gap:4px;align-items:center;
  flex-shrink:0;opacity:0;transition:opacity 0.15s;
}
.milestone-top-row:hover .milestone-actions{opacity:1}
.chevron{
  width:20px;height:20px;color:var(--t3);
  transition:transform 0.3s var(--zen);
  flex-shrink:0;margin-top:1px;
}
.milestone.expanded .chevron{transform:rotate(180deg)}

.milestone-info{
  display:flex;align-items:center;gap:10px;
  margin-top:10px;flex-wrap:wrap;
}
.milestone-date{
  font-size:12px;color:var(--t3);font-weight:600;
  display:flex;align-items:center;gap:4px;
}
.milestone-date svg{width:12px;height:12px;opacity:0.4}
.milestone-progress{
  flex:1;display:flex;align-items:center;gap:8px;
  min-width:100px;
}
.milestone-progress .progress-bar{
  flex:1;height:5px;border-radius:3px;
  background:var(--border);overflow:hidden;
  position:relative;
}
.milestone-progress .progress-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg, var(--teal), var(--teal-bright));
  transition:width 0.6s var(--zen);
  position:relative;
  will-change:width;
}
.milestone-progress .progress-fill.complete{
  background:linear-gradient(90deg, var(--green), var(--become));
}
.milestone-progress .progress-text{font-size:11px;color:var(--t3);font-weight:700;min-width:30px;text-align:right;font-variant-numeric:tabular-nums}
.milestone-effort{
  font-size:11px;color:var(--t3);font-weight:600;
  display:flex;align-items:center;gap:4px;
}
.milestone-effort svg{width:11px;height:11px;opacity:0.4}

.milestone-desc{font-size:13px;color:var(--t2);line-height:1.5;margin-top:8px}
.milestone-desc[contenteditable]{outline:none;border-radius:4px;padding:2px 4px;margin:-2px -4px}
.milestone-desc[contenteditable]:focus{background:rgba(51,163,163,0.04);box-shadow:inset 0 0 0 1px var(--focus-border)}
.milestone-desc-placeholder{
  font-size:13px;color:var(--t3);font-style:italic;
  margin-top:8px;cursor:pointer;opacity:0.4;
  transition:opacity 0.15s;
}
.milestone-desc-placeholder:hover{opacity:0.7}
.milestone-date-edit{
  border:1px solid var(--border);border-radius:var(--r-xs);
  padding:4px 8px;font-size:12px;font-family:inherit;
  color:var(--text);background:var(--card);outline:none;
  min-height:28px;width:130px;
}
.milestone-date-edit:focus{border-color:var(--focus-border);box-shadow:var(--focus-ring)}

/* Status summary pills */
.status-summary{
  display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;
}
.status-summary-pill{
  font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:100px;
  display:flex;align-items:center;gap:3px;
  letter-spacing:0.1px;
}
.ssp-draft{background:rgba(26,20,16,0.04);color:var(--t3)}
.ssp-in-progress{background:rgba(51,163,163,0.07);color:var(--teal)}
.ssp-review{background:rgba(99,102,241,0.06);color:var(--align)}
.ssp-approved{background:rgba(52,211,153,0.06);color:#059669}

/* ===== TASK LIST ===== */
.task-list{
  max-height:0;overflow:hidden;
  transition:max-height 0.4s var(--zen);
  border-top:1px solid transparent;
}
.milestone.expanded .task-list{border-top-color:var(--border)}
.task-list-inner{padding:4px 18px 16px}

.task-group-label{
  font-size:9px;font-weight:800;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--t3);
  padding:14px 0 6px;
}
.task-group-label:first-child{padding-top:10px}

.task{
  display:flex;align-items:flex-start;gap:8px;
  padding:9px 8px;margin:1px -8px;
  border-radius:var(--r-xs);
  transition:background 0.12s ease;
}
.task:hover{background:rgba(26,20,16,0.018)}

.task-status-btn{
  flex-shrink:0;width:26px;height:26px;
  border-radius:50%;border:2px solid var(--border);
  background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s var(--zen);
  min-height:26px;margin-top:1px;
  -webkit-tap-highlight-color:transparent;
}
.task-status-btn:hover{border-color:var(--border-strong)}
.task-status-btn:active{transform:scale(0.85)}
.task-status-btn[data-status="draft"]{border-color:rgba(26,20,16,0.12)}
.task-status-btn[data-status="draft"]:hover{border-color:var(--teal)}
.task-status-btn[data-status="in-progress"]{border-color:var(--teal);background:var(--teal-soft)}
.task-status-btn[data-status="in-progress"] svg{color:var(--teal)}
.task-status-btn[data-status="review"]{border-color:var(--align);background:var(--align-soft)}
.task-status-btn[data-status="review"] svg{color:var(--align)}
.task-status-btn[data-status="approved"]{
  border-color:var(--become);background:var(--become);
  animation:statusPop 0.3s var(--spring);
}
.task-status-btn[data-status="approved"] svg{color:#fff}
@keyframes statusPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.task-status-btn svg{width:11px;height:11px;color:var(--t3)}

.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;line-height:1.4;color:var(--text);letter-spacing:-0.1px}
.task-title[contenteditable]{outline:none;border-radius:4px;padding:1px 4px;margin:-1px -4px}
.task-title[contenteditable]:focus{background:rgba(51,163,163,0.04);box-shadow:inset 0 0 0 1px var(--focus-border)}
.task[data-status="approved"] .task-title{text-decoration:line-through;color:var(--t3)}

.task-desc{font-size:12px;color:var(--t3);line-height:1.45;margin-top:2px}
.task-desc[contenteditable]{outline:none;border-radius:4px;padding:1px 4px;margin:-1px -4px}
.task-desc[contenteditable]:focus{background:rgba(51,163,163,0.04);box-shadow:inset 0 0 0 1px var(--focus-border)}
.task-desc-placeholder{
  font-size:12px;color:var(--t3);font-style:italic;
  margin-top:2px;cursor:pointer;opacity:0;
  transition:opacity 0.15s;
}
.task:hover .task-desc-placeholder{opacity:0.4}
.task-desc-placeholder:hover{opacity:0.6 !important}

.task-meta{display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap}
.task-badge{
  display:inline-flex;align-items:center;
  padding:2px 8px;border-radius:100px;
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.3px;
  height:20px;
}
.badge-draft{background:rgba(26,20,16,0.04);color:var(--t3)}
.badge-in-progress{background:rgba(51,163,163,0.07);color:var(--teal)}
.badge-review{background:rgba(99,102,241,0.06);color:var(--align)}
.badge-approved{background:rgba(52,211,153,0.06);color:#059669}
.task-due{
  font-size:11px;color:var(--t3);font-weight:500;
  display:inline-flex;align-items:center;gap:3px;
  height:20px;
}
.task-due svg{width:10px;height:10px;opacity:0.4}
.task-due.overdue{color:var(--red);font-weight:700}
.task-assignee{
  font-size:11px;color:var(--t2);font-weight:500;
  padding:0 8px;border-radius:100px;
  background:rgba(26,20,16,0.025);
  display:inline-flex;align-items:center;gap:3px;
  height:20px;
}
.task-assignee svg{width:10px;height:10px;opacity:0.35}
.task-comment-count{
  font-size:11px;color:var(--t3);cursor:pointer;font-weight:500;
  display:inline-flex;align-items:center;gap:3px;
  padding:0 6px;border-radius:100px;
  transition:all 0.15s;height:20px;
}
.task-comment-count svg{width:11px;height:11px}
.task-comment-count:hover{color:var(--teal);background:var(--teal-soft)}

/* Priority badge */
.task-priority{
  font-size:10px;font-weight:700;
  padding:0 7px;border-radius:100px;
  text-transform:uppercase;letter-spacing:0.2px;
  cursor:pointer;transition:all 0.15s;
  height:20px;display:inline-flex;align-items:center;
}
.priority-low{background:rgba(26,20,16,0.03);color:var(--t3)}
.priority-medium{background:rgba(51,163,163,0.06);color:var(--teal)}
.priority-high{background:rgba(249,115,22,0.07);color:var(--orange)}
.priority-critical{background:rgba(239,68,68,0.07);color:var(--red)}

/* Effort badge */
.task-effort{
  font-size:10px;font-weight:600;color:var(--t3);
  display:inline-flex;align-items:center;gap:3px;
  cursor:pointer;padding:0 6px;border-radius:100px;
  transition:all 0.15s;height:20px;
}
.task-effort:hover{background:rgba(26,20,16,0.025)}
.task-effort svg{width:10px;height:10px;opacity:0.35}

/* Task actions */
.task-actions{
  display:flex;gap:2px;align-items:center;
  flex-shrink:0;opacity:0;
  transition:opacity 0.15s;
  margin-top:1px;
}
.task:hover .task-actions{opacity:1}
.task-action-btn{
  width:28px;height:28px;border-radius:50%;
  border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--t3);transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.task-action-btn:hover{background:rgba(26,20,16,0.04);color:var(--text)}
.task-action-btn.del:hover{background:rgba(239,68,68,0.06);color:var(--red)}
.task-action-btn svg{width:14px;height:14px}

/* Status dropdown */
.status-dropdown,.priority-dropdown{
  position:fixed;z-index:200;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-sm);box-shadow:var(--shadow-lg);
  padding:4px;min-width:160px;
  animation:dropIn 0.12s var(--zen);
}
@keyframes dropIn{from{opacity:0;transform:translateY(-4px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.status-option,.priority-option{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:var(--r-xs);
  font-size:13px;font-weight:500;
  cursor:pointer;border:none;background:transparent;
  width:100%;font-family:inherit;color:var(--text);
  min-height:36px;transition:background 0.08s;
  -webkit-tap-highlight-color:transparent;
}
.status-option:hover,.priority-option:hover{background:rgba(26,20,16,0.03)}
.status-option.current,.priority-option.current{background:var(--teal-hover);font-weight:700}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ===== COMMENTS ===== */
.comment-section{
  max-height:0;overflow:hidden;
  transition:max-height 0.3s var(--zen);
}
.comment-section.open{margin-top:8px}
.comment-list{padding:8px 0}
.comment{display:flex;gap:8px;padding:6px 0}
.comment-avatar{
  width:24px;height:24px;border-radius:50%;
  background:var(--teal-soft);color:var(--teal);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;flex-shrink:0;
  text-transform:uppercase;letter-spacing:0.5px;
}
.comment-body{flex:1;min-width:0}
.comment-header{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.comment-author{font-size:12px;font-weight:700;color:var(--text)}
.comment-time{font-size:10px;color:var(--t3);font-weight:500}
.comment-del{
  margin-left:auto;border:none;background:transparent;
  color:var(--t3);cursor:pointer;font-size:11px;font-weight:500;
  opacity:0;transition:opacity 0.15s;padding:2px 6px;border-radius:4px;
}
.comment:hover .comment-del{opacity:1}
.comment-del:hover{color:var(--red);background:rgba(239,68,68,0.04)}
.comment-text{font-size:13px;color:var(--t2);line-height:1.5}
.comment-input-row{display:flex;gap:8px;align-items:flex-end;padding:8px 0 0}
.comment-input{
  flex:1;border:1px solid var(--border);
  border-radius:var(--r-xs);padding:8px 12px;
  font-size:13px;font-family:inherit;color:var(--text);
  background:var(--bg);outline:none;
  resize:none;min-height:36px;max-height:80px;
}
.comment-input:focus{border-color:var(--focus-border);box-shadow:var(--focus-ring)}
.comment-send{
  width:34px;height:34px;border-radius:50%;
  border:none;background:var(--teal);color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.15s var(--zen);
}
.comment-send:hover{background:var(--teal-bright);transform:scale(1.04)}
.comment-send:active{transform:scale(0.92)}
.comment-send svg{width:13px;height:13px}

/* ===== ADD BUTTONS ===== */
.add-task-row{padding:4px 0 0}
.add-task-btn, .add-milestone-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;border-radius:var(--r-xs);
  border:1.5px dashed var(--border);
  background:transparent;color:var(--t3);
  font-size:13px;font-weight:500;cursor:pointer;
  font-family:inherit;width:100%;
  transition:all 0.15s var(--zen);
  min-height:38px;-webkit-tap-highlight-color:transparent;
}
.add-task-btn:hover, .add-milestone-btn:hover{
  border-color:rgba(51,163,163,0.25);
  color:var(--teal);background:var(--teal-hover);
}
.add-task-btn svg, .add-milestone-btn svg{width:14px;height:14px}
.add-milestone-btn{
  margin-top:16px;padding:14px 16px;
  border-radius:var(--r);font-size:14px;font-weight:600;
}

/* Inline form */
.inline-form{display:flex;gap:8px;padding:8px 0 0}
.inline-form input{
  flex:1;border:1px solid var(--border);
  border-radius:var(--r-xs);padding:8px 12px;
  font-size:13px;font-family:inherit;color:var(--text);
  background:var(--card);outline:none;min-height:36px;
}
.inline-form input:focus{border-color:var(--focus-border);box-shadow:var(--focus-ring)}
.inline-form button{
  padding:8px 16px;border-radius:var(--r-xs);
  border:none;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;min-height:36px;transition:all 0.15s;
}
.inline-form .submit-btn{background:var(--teal);color:#fff}
.inline-form .submit-btn:hover{background:var(--teal-bright)}
.inline-form .cancel-btn{background:transparent;color:var(--t3);border:1px solid var(--border)}
.inline-form .cancel-btn:hover{border-color:var(--border-strong);color:var(--t2)}

/* Assignee/effort edit */
.assignee-edit, .effort-edit{
  border:1px solid var(--border);border-radius:var(--r-xs);
  padding:3px 8px;font-size:11px;font-family:inherit;
  color:var(--text);background:var(--card);outline:none;
  height:22px;
}
.assignee-edit{width:110px}
.effort-edit{width:56px}
.assignee-edit:focus,.effort-edit:focus{border-color:var(--focus-border);box-shadow:var(--focus-ring)}

/* Due date edit */
.task-due-edit, .milestone-date-edit{
  border:1px solid var(--border);border-radius:var(--r-xs);
  padding:3px 8px;font-size:12px;font-family:inherit;
  color:var(--text);background:var(--card);outline:none;
  min-height:28px;width:130px;
}
.task-due-edit:focus, .milestone-date-edit:focus{
  border-color:var(--focus-border);box-shadow:var(--focus-ring);
}

/* Toast */
.toast{
  position:fixed;bottom:max(24px, var(--safe-bottom, 24px));left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--text);color:#fff;
  padding:11px 22px;border-radius:100px;
  font-size:13px;font-weight:600;letter-spacing:-0.1px;
  box-shadow:var(--shadow-lg), 0 0 0 1px rgba(0,0,0,0.05);
  z-index:9999;opacity:0;
  transition:all 0.35s var(--zen);
  pointer-events:none;
  max-width:calc(100vw - 32px);
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}

/* Empty */
.empty-state{text-align:center;padding:60px 24px;color:var(--t3)}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:0.2}
.empty-state p{font-size:14px;line-height:1.6;max-width:280px;margin:0 auto}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--t3);font-size:13px;font-weight:500;gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .hero-header{padding:0 16px}
  .hero-top{padding:12px 0 0}
  .hero-title{font-size:18px}
  .progress-ring-wrap{gap:12px;padding:10px 0 12px}
  .progress-ring-container{width:62px;height:62px}
  .progress-ring-container svg{width:62px;height:62px}
  .progress-ring-pct{font-size:16px}
  .progress-stats{gap:6px}
  .p-stat{padding:8px 10px;min-height:50px}
  .p-stat-num{font-size:17px}
  .p-stat-label{font-size:8px}
  .main{padding:16px 16px 120px}
  .ai-panel{padding:0 16px}
  .launch-alert{padding:0 16px}
  .burndown-wrap{padding:0 16px}
  .milestone{padding-left:38px}
  .timeline::before{left:11px}
  .milestone-dot{left:3px;width:17px;height:17px}
  .task-actions{opacity:1}
  .milestone-actions{opacity:1}
  .task-desc-placeholder{opacity:0.3 !important}
  .drag-handle{opacity:0.4;width:16px}
  .task{gap:6px;padding:8px 6px;margin:1px -6px}
  .task-status-btn{width:28px;height:28px;min-height:28px}
  .config-inner{padding:10px 16px;flex-wrap:wrap}
}
@media(max-width:480px){
  .hero-header{padding:0 14px}
  .hero-actions{gap:4px}
  .icon-btn{width:34px;height:34px}
  .milestone{padding-left:34px}
  .timeline::before{left:9px}
  .milestone-dot{left:1px;width:16px;height:16px}
  .milestone-header{padding:14px 14px 12px}
  .milestone-title{font-size:14px}
  .task-list-inner{padding:4px 14px 14px}
  .progress-stats{gap:4px}
  .p-stat{padding:7px 8px;min-height:46px}
  .p-stat-num{font-size:15px}
  .p-stat-label{font-size:8px;letter-spacing:0.5px}
  .ai-panel{padding:0 14px}
  .launch-alert{padding:0 14px}
  .burndown-wrap{padding:0 14px}
  .main{padding:16px 14px 120px}
  .task-meta{gap:4px}
  .task-badge,.task-priority,.task-effort,.task-assignee,.task-comment-count,.task-due{font-size:10px;height:18px}
}
@media(max-width:375px){
  .milestone-title{font-size:14px}
  .task-title{font-size:13px}
  .progress-ring-container{width:54px;height:54px}
  .progress-ring-container svg{width:54px;height:54px}
  .progress-ring-pct{font-size:14px}
  .progress-ring-label{font-size:7px}
  .hero-title{font-size:17px}
  .filter-pill{font-size:11px;padding:5px 10px;min-height:28px}
}

/* ===== DARK MODE ===== */
[data-theme="dark"]{
  --bg:#0B0D13;
  --bg-elevated:#12141C;
  --card:#151820;
  --card-hover:#1A1D27;
  --border:rgba(255,255,255,0.06);
  --border-strong:rgba(255,255,255,0.1);
  --text:#E4E2DF;
  --t2:rgba(228,226,223,0.6);
  --t3:rgba(228,226,223,0.35);
  --teal-soft:rgba(51,163,163,0.1);
  --teal-hover:rgba(51,163,163,0.06);
  --align-soft:rgba(99,102,241,0.1);
  --become-soft:rgba(52,211,153,0.1);
  --shadow-xs:0 1px 2px rgba(0,0,0,0.3);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.25), 0 2px 8px rgba(0,0,0,0.2);
  --shadow-md:0 2px 6px rgba(0,0,0,0.2), 0 6px 20px rgba(0,0,0,0.25);
  --shadow-lg:0 4px 12px rgba(0,0,0,0.25), 0 12px 40px rgba(0,0,0,0.3);
  --focus-ring:0 0 0 3px rgba(51,163,163,0.15);
  --focus-border:rgba(51,163,163,0.45);
}
[data-theme="dark"] .hero-header{background:linear-gradient(180deg, rgba(46,158,158,0.04) 0%, var(--bg) 100%)}
[data-theme="dark"] .ai-card{background:linear-gradient(135deg, rgba(46,158,158,0.04) 0%, rgba(99,102,241,0.03) 100%);border-color:rgba(46,158,158,0.08)}
[data-theme="dark"] .task:hover{background:rgba(255,255,255,0.015)}
[data-theme="dark"] .comment-input{background:var(--bg-elevated)}
[data-theme="dark"] .config-input,[data-theme="dark"] .milestone-date-edit,[data-theme="dark"] .task-due-edit,[data-theme="dark"] .assignee-edit,[data-theme="dark"] .effort-edit{background:var(--bg-elevated);color:var(--text);border-color:var(--border)}
[data-theme="dark"] ::selection{background:rgba(51,163,163,0.3)}
[data-theme="dark"] .auth-gate{background:var(--bg)}
[data-theme="dark"] .launch-alert-inner{background:rgba(239,68,68,0.06);border-color:rgba(239,68,68,0.1)}
[data-theme="dark"] .launch-alert-inner input[type="date"]{background:var(--bg-elevated);color:var(--text);border-color:var(--border)}
[data-theme="dark"] .launch-alert-inner .save-btn{background:var(--red)}
[data-theme="dark"] .inline-form input{background:var(--bg-elevated);color:var(--text);border-color:var(--border)}
[data-theme="dark"] .filter-pill.on{background:var(--text);color:var(--bg)}
[data-theme="dark"] .milestone-progress .progress-bar{background:rgba(255,255,255,0.04)}
[data-theme="dark"] .progress-ring-bg{stroke:rgba(255,255,255,0.06)}
[data-theme="dark"] .badge-draft{background:rgba(255,255,255,0.04)}
[data-theme="dark"] .ssp-draft{background:rgba(255,255,255,0.04)}
[data-theme="dark"] .priority-low{background:rgba(255,255,255,0.04)}
[data-theme="dark"] .task-assignee{background:rgba(255,255,255,0.04)}
[data-theme="dark"] .status-option:hover,[data-theme="dark"] .priority-option:hover{background:rgba(255,255,255,0.03)}
[data-theme="dark"] .status-option.current,[data-theme="dark"] .priority-option.current{background:var(--teal-hover)}
[data-theme="dark"] .task-action-btn:hover{background:rgba(255,255,255,0.04)}
[data-theme="dark"] .task-effort:hover{background:rgba(255,255,255,0.04)}
[data-theme="dark"] .add-task-btn:hover,[data-theme="dark"] .add-milestone-btn:hover{background:rgba(51,163,163,0.04)}
[data-theme="dark"] .add-task-btn,[data-theme="dark"] .add-milestone-btn{border-color:rgba(255,255,255,0.05)}
[data-theme="dark"] .toolbar-btn:hover{background:rgba(51,163,163,0.06)}
[data-theme="dark"] .icon-btn:hover{background:rgba(51,163,163,0.08)}
[data-theme="dark"] .comment-del:hover{background:rgba(239,68,68,0.08)}
[data-theme="dark"] .toast{background:var(--text);color:var(--bg)}
[data-theme="dark"] .burndown-card{background:var(--card)}
[data-theme="dark"] .kb-close:hover{background:rgba(255,255,255,0.04)}
[data-theme="dark"] .filter-pill:hover{border-color:rgba(255,255,255,0.1);color:var(--text)}
[data-theme="dark"] .milestone-card{border-color:rgba(255,255,255,0.04)}
[data-theme="dark"] .milestone.expanded .milestone-card{border-color:rgba(255,255,255,0.08)}
[data-theme="dark"] .ai-icon{box-shadow:0 2px 8px rgba(46,158,158,0.3)}

/* Dark mode toggle button */
.theme-btn svg{width:16px;height:16px}
.theme-btn .sun{display:none}
.theme-btn .moon{display:block}
[data-theme="dark"] .theme-btn .sun{display:block}
[data-theme="dark"] .theme-btn .moon{display:none}

/* ===== STATUS CHANGE FLASH ===== */
@keyframes statusFlash{
  0%{background:rgba(51,163,163,0.1)}
  100%{background:transparent}
}
.task.flash{animation:statusFlash 0.5s ease-out}

/* Milestone complete glow */
@keyframes milestoneGlow{
  0%{box-shadow:var(--shadow-sm), 0 0 0 0 rgba(52,211,153,0.25)}
  40%{box-shadow:var(--shadow-md), 0 0 24px 6px rgba(52,211,153,0.12)}
  100%{box-shadow:var(--shadow-sm), 0 0 0 0 rgba(52,211,153,0)}
}
.milestone-card.celebrate{animation:milestoneGlow 1.5s ease-out}

/* Counting animation for pct */
.ring-counting{transition:none !important}

/* ===== COMMAND PALETTE ===== */
.cmd-overlay{
  position:fixed;inset:0;z-index:10000;
  background:rgba(0,0,0,0.45);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:flex-start;justify-content:center;
  padding-top:min(18vh, 140px);
  animation:fadeIn 0.1s ease;
}
[data-theme="dark"] .cmd-overlay{background:rgba(0,0,0,0.6)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.cmd-panel{
  width:min(520px, calc(100vw - 32px));
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;box-shadow:var(--shadow-lg), 0 0 0 1px rgba(0,0,0,0.02);
  overflow:hidden;
  animation:cmdSlide 0.15s var(--zen);
}
@keyframes cmdSlide{from{opacity:0;transform:translateY(-6px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.cmd-input-wrap{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;border-bottom:1px solid var(--border);
}
.cmd-input-wrap svg{width:17px;height:17px;color:var(--t3);flex-shrink:0}
.cmd-input{
  flex:1;border:none;background:transparent;outline:none;
  font-size:15px;font-family:inherit;color:var(--text);
  font-weight:500;
}

<script>
(function(){
  let currentUser = null;
  let config = null;
  let milestones = [];
  let allTasks = [];
  let tasksByMilestone = {};
  let expandedMilestones = new Set();
  let openStatusDropdown = null;
  let openPriorityDropdown = null;
  let openComments = new Set();
  let commentsByTask = {};
  let statusFilter = 'all';
  let aiVisible = true;

  // ===== AUTH =====
  async function checkAuth() {
    try {
      const res = await fetch('/api/auth/me');
      if (!res.ok) throw new Error();
      currentUser = await res.json();
      document.getElementById('authGate').style.display = 'none';
      requestAnimationFrame(() => document.body.classList.add('loaded'));
      init();
    } catch { window.location.href = '/login'; }
  }

  // ===== API =====
  async function api(url, opts = {}) {
    const res = await fetch(url, {
      ...opts,
      headers: { 'Content-Type': 'application/json', ...opts.headers },
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
    if (res.status === 401) { window.location.href = '/login'; return null; }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  let toastTimer = null;
  function toast(msg, undoFn) {
    const el = document.getElementById('toast');
    if (toastTimer) clearTimeout(toastTimer);
    if (undoFn) {
      el.innerHTML = `<div class="toast-inner"><span>${msg}</span><button class="toast-undo" id="toastUndo">Undo</button></div>`;
      document.getElementById('toastUndo').addEventListener('click', () => { el.classList.remove('show'); undoFn(); });
    } else {
      el.textContent = msg;
    }
    el.classList.add('show');
    toastTimer = setTimeout(() => el.classList.remove('show'), undoFn ? 5000 : 2500);
  }

  // ===== INIT =====
  async function init() {
    await Promise.all([loadConfig(), loadMilestones()]);
    await loadAllTasks();
    renderFilters();
    render();
    setupEvents();
    computeAI();
  }

  async function loadConfig() {
    config = await api('/api/tracker-config');
    if (!config) return;
    updateHeaderStats();
    document.getElementById('launchDateInput').value = config.launch_date;
  }

  async function loadMilestones() {
    milestones = await api('/api/tracker-milestones') || [];
    updateHeaderStats();
  }

  async function loadTasks(mid) {
    const tasks = await api('/api/tracker-tasks?milestone_id=' + mid) || [];
    tasksByMilestone[mid] = tasks;
    return tasks;
  }

  async function loadAllTasks() {
    // Load tasks for every milestone
    const promises = milestones.map(m => loadTasks(m.id));
    await Promise.all(promises);
    allTasks = [];
    Object.values(tasksByMilestone).forEach(ts => allTasks.push(...ts));
  }

  async function loadComments(tid) {
    const comments = await api('/api/tracker-comments?task_id=' + tid) || [];
    commentsByTask[tid] = comments;
    return comments;
  }

  // ===== HEADER STATS =====
  function updateHeaderStats() {
    if (!config) return;
    const ld = new Date(config.launch_date + 'T00:00:00');
    const now = new Date(); now.setHours(0,0,0,0);
    const diff = Math.ceil((ld - now) / 86400000);

    const cdEl = document.getElementById('statCountdown');
    cdEl.querySelector('.p-stat-num').textContent = Math.abs(diff);
    cdEl.querySelector('.p-stat-label').textContent = diff > 0 ? 'Days Left' : diff === 0 ? 'Launch Day' : 'Days Past';
    // Reset color classes then apply correct one
    cdEl.classList.remove('teal','red','amber');
    if (diff < 0) cdEl.classList.add('red');
    else if (diff <= 7) cdEl.classList.add('red');
    else if (diff <= 14) cdEl.classList.add('amber');
    else cdEl.classList.add('teal');

    // Show/hide launch alert banner
    const alertEl = document.getElementById('launchAlert');
    if (diff < 0) {
      alertEl.style.display = '';
      document.getElementById('launchAlertText').textContent = `Launch date was ${Math.abs(diff)} days ago. Update it to see accurate calculations.`;
    } else {
      alertEl.style.display = 'none';
    }

    let total = 0, approved = 0, active = 0;
    milestones.forEach(m => {
      total += m.task_count || 0;
      approved += m.approved_count || 0;
    });
    active = total - approved;

    const pct = total > 0 ? Math.round((approved / total) * 100) : 0;

    // Update ring
    const ring = document.getElementById('progressRing');
    const circ = 2 * Math.PI * 30; // 188.5
    ring.style.strokeDashoffset = circ - (circ * pct / 100);
    document.getElementById('ringPct').textContent = pct + '%';

    // Update stat cards
    document.getElementById('statDone').querySelector('.p-stat-num').textContent = approved;
    document.getElementById('statActive').querySelector('.p-stat-num').textContent = active;
  }

  // ===== AI INTELLIGENCE =====
  async function computeAI() {
    // Load all tasks first for full analysis
    await loadAllTasks();

    const insights = [];
    const now = new Date(); now.setHours(0,0,0,0);
    const ld = config ? new Date(config.launch_date + 'T00:00:00') : now;
    const daysLeft = Math.ceil((ld - now) / 86400000);
    const total = allTasks.length;
    const done = allTasks.filter(t => t.status === 'approved').length;
    const inProg = allTasks.filter(t => t.status === 'in-progress').length;
    const inReview = allTasks.filter(t => t.status === 'review').length;
    const drafts = allTasks.filter(t => t.status === 'draft').length;
    const overdue = allTasks.filter(t => t.status !== 'approved' && isOverdue(t.due_date)).length;
    const remaining = total - done;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;

    // 1. Overall status assessment
    if (daysLeft < 0) {
      // Launch date has passed
      if (remaining === total) {
        insights.push({ icon: 'risk', emoji: '\u26A0\uFE0F', title: 'Launch Date Has Passed', desc: `The launch date was ${Math.abs(daysLeft)} days ago and no tasks are complete yet. Update the launch date in Settings, or start marking tasks as complete.` });
      } else if (remaining > 0) {
        insights.push({ icon: 'risk', emoji: '\u26A0\uFE0F', title: 'Past Launch Date', desc: `Launch was ${Math.abs(daysLeft)} days ago. ${done}/${total} tasks complete (${pct}%). ${remaining} tasks still remain.` });
      } else {
        insights.push({ icon: 'velocity', emoji: '\u2705', title: 'All Tasks Complete', desc: `All ${total} tasks are done! The project launched ${Math.abs(daysLeft)} days ago.` });
      }
    } else if (daysLeft === 0) {
      insights.push({ icon: 'streak', emoji: '\uD83D\uDE80', title: 'Launch Day!', desc: `Today is launch day. ${done}/${total} tasks (${pct}%) are complete.` });
    } else {
      // Future launch date: calculate velocity
      // Use the earliest task date and today to determine elapsed working time
      const allDates = allTasks.map(t => t.due_date).filter(Boolean).map(d => new Date(d + 'T00:00:00'));
      const earliestDate = allDates.length ? new Date(Math.min(...allDates)) : now;
      const totalSpan = Math.max(1, Math.ceil((ld - earliestDate) / 86400000));
      const elapsed = Math.max(1, Math.ceil((now - earliestDate) / 86400000));
      const expectedPct = Math.min(100, Math.round((elapsed / totalSpan) * 100));
      const velocityDelta = pct - expectedPct;

      if (done === 0 && total > 0) {
        insights.push({ icon: 'velocity', emoji: '\uD83D\uDCCA', title: `${total} Tasks, ${daysLeft} Days`, desc: `${total} tasks across ${milestones.length} milestones. That's roughly ${(total / Math.max(1, daysLeft) * 7).toFixed(1)} tasks per week needed. Start completing tasks to unlock velocity insights.` });
      } else if (velocityDelta >= 5) {
        insights.push({ icon: 'velocity', emoji: '\u26A1', title: 'Ahead of Schedule', desc: `${pct}% complete with ${daysLeft} days remaining. You're ${Math.abs(velocityDelta)} points ahead of target pace.` });
      } else if (velocityDelta <= -10) {
        insights.push({ icon: 'risk', emoji: '\u26A0\uFE0F', title: 'Behind Schedule', desc: `${pct}% complete but expected ~${expectedPct}% by now. ${remaining} tasks still need attention.` });
      } else {
        insights.push({ icon: 'velocity', emoji: '\u2705', title: 'On Track', desc: `${pct}% complete with ${daysLeft} days left. Current pace is aligned with the launch timeline.` });
      }
    }

    // 2. Bottleneck detection
    if (inReview >= 3) {
      insights.push({ icon: 'risk', emoji: '\uD83D\uDED1', title: 'Review Bottleneck', desc: `${inReview} tasks are waiting for review. Consider approving completed work to maintain momentum.` });
    }

    // 3. Overdue alert
    if (overdue > 0) {
      insights.push({ icon: 'risk', emoji: '\u23F0', title: `${overdue} Overdue Task${overdue > 1 ? 's' : ''}`, desc: `${overdue} task${overdue > 1 ? 's have' : ' has'} passed ${overdue > 1 ? 'their' : 'its'} due date without completion. Prioritize or reschedule.` });
    }

    // 4. Completion prediction (only when we have velocity data)
    if (done > 0 && remaining > 0) {
      // Use earliest updated_at from approved tasks to calculate real velocity
      const approvedTasks = allTasks.filter(t => t.status === 'approved');
      const approvedDates = approvedTasks.map(t => new Date(t.updated_at || t.created_at)).filter(d => !isNaN(d));
      const earliestApproved = approvedDates.length ? new Date(Math.min(...approvedDates)) : now;
      const daysSinceStart = Math.max(1, Math.ceil((now - earliestApproved) / 86400000));
      const rate = done / daysSinceStart;
      const daysNeeded = Math.ceil(remaining / rate);
      const predictedDate = new Date(now);
      predictedDate.setDate(predictedDate.getDate() + daysNeeded);
      const onTime = daysLeft > 0 ? predictedDate <= ld : false;
      if (daysLeft > 0) {
        insights.push({
          icon: 'prediction', emoji: '\uD83D\uDD2E',
          title: 'Projected Completion',
          desc: onTime
            ? `At current velocity, all tasks should be done by ${fmtDateFull(predictedDate.toISOString().split('T')[0])}, ${Math.ceil((ld - predictedDate) / 86400000)} days before launch.`
            : `At current pace, completion is projected for ${fmtDateFull(predictedDate.toISOString().split('T')[0])}, which is ${Math.ceil((predictedDate - ld) / 86400000)} days after launch. Increase velocity or reduce scope.`
        });
      }
    }

    // 5. Task breakdown insight (always useful)
    if (total > 0) {
      const parts = [];
      if (drafts > 0) parts.push(`${drafts} draft`);
      if (inProg > 0) parts.push(`${inProg} in progress`);
      if (inReview > 0) parts.push(`${inReview} in review`);
      if (done > 0) parts.push(`${done} approved`);
      insights.push({ icon: 'effort', emoji: '\uD83D\uDCCB', title: 'Task Breakdown', desc: `${total} total: ${parts.join(', ')}.` });
    }

    // 6. Effort estimate
    const tasksWithEffort = allTasks.filter(t => t.effort_hours && t.status !== 'approved');
    const totalEffort = tasksWithEffort.reduce((s, t) => s + parseFloat(t.effort_hours || 0), 0);
    if (totalEffort > 0) {
      const doneEffort = allTasks.filter(t => t.effort_hours && t.status === 'approved').reduce((s, t) => s + parseFloat(t.effort_hours || 0), 0);
      insights.push({ icon: 'effort', emoji: '\u23F1\uFE0F', title: `${totalEffort.toFixed(0)}h Remaining Effort`, desc: `${tasksWithEffort.length} tasks with effort estimates totaling ${totalEffort.toFixed(0)} hours remaining${doneEffort > 0 ? ` (${doneEffort.toFixed(0)}h completed)` : ''}. Add effort estimates to tasks for better projections.` });
    } else if (total > 0) {
      insights.push({ icon: 'effort', emoji: '\u23F1\uFE0F', title: 'No Effort Estimates', desc: 'Add hour estimates to tasks (click the clock icon) to unlock effort tracking and workload projections.' });
    }

    // 7. Critical priority
    const critical = allTasks.filter(t => t.priority === 'critical' && t.status !== 'approved');
    if (critical.length > 0) {
      insights.push({ icon: 'risk', emoji: '\uD83D\uDD25', title: `${critical.length} Critical Task${critical.length > 1 ? 's' : ''}`, desc: `${critical.map(t => '"' + t.title + '"').slice(0,3).join(', ')}${critical.length > 3 ? '...' : ''} marked as critical priority.` });
    }

    // 8. Next milestone (find first incomplete one sorted by date)
    const incompleteMilestones = milestones.filter(m => (m.approved_count || 0) < (m.task_count || 1));
    const nextMilestone = incompleteMilestones[0]; // already sorted by sort_order
    if (nextMilestone) {
      const mDate = new Date(nextMilestone.target_date + 'T00:00:00');
      const mDays = Math.ceil((mDate - now) / 86400000);
      const mPct = nextMilestone.task_count > 0 ? Math.round((nextMilestone.approved_count / nextMilestone.task_count) * 100) : 0;
      const mRemaining = (nextMilestone.task_count || 0) - (nextMilestone.approved_count || 0);
      if (mDays >= 0) {
        insights.push({ icon: 'streak', emoji: '\uD83C\uDFAF', title: `Next: ${nextMilestone.title}`, desc: `Due in ${mDays} day${mDays !== 1 ? 's' : ''} (${fmtDate(nextMilestone.target_date)}). ${mRemaining} of ${nextMilestone.task_count} tasks remaining (${mPct}% done).` });
      } else {
        insights.push({ icon: 'risk', emoji: '\uD83C\uDFAF', title: `Overdue: ${nextMilestone.title}`, desc: `Was due ${Math.abs(mDays)} days ago (${fmtDate(nextMilestone.target_date)}). ${mRemaining} of ${nextMilestone.task_count} tasks still remaining.` });
      }
    }

    // Render insights
    const el = document.getElementById('aiInsights');
    if (!insights.length) {
      el.innerHTML = '<div style="padding:8px 0;font-size:13px;color:var(--t3)">Not enough data for insights yet. Start completing tasks!</div>';
    } else {
      el.innerHTML = insights.map(i => `
        <div class="ai-insight">
          <div class="ai-insight-icon ${i.icon}">${i.emoji}</div>
          <div class="ai-insight-body">
            <div class="ai-insight-title">${i.title}</div>
            <div class="ai-insight-desc">${i.desc}</div>
          </div>
        </div>
      `).join('');
    }
    document.getElementById('aiLastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  // ===== COMPUTED =====
  function fmtDate(d) {
    if (!d) return '';
    return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
  function fmtDateFull(d) {
    if (!d) return '';
    return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function relTime(d) {
    const s = Math.floor((new Date() - new Date(d)) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    return Math.floor(s/86400) + 'd ago';
  }
  function initials(email) { return email ? email.split('@')[0].substring(0,2).toUpperCase() : '?'; }
  function isOverdue(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr + 'T00:00:00');
    const now = new Date(); now.setHours(0,0,0,0);
    return d < now;
  }
  function esc(s) { if (!s) return ''; const e = document.createElement('span'); e.textContent = s; return e.innerHTML; }

  // ===== STATUS =====
  const statusIcons = {
    'draft': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="4"/></svg>',
    'in-progress': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>',
    'review': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
    'approved': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
  };
  const statusLabels = { 'draft':'Draft', 'in-progress':'In Progress', 'review':'Review', 'approved':'Approved' };
  const statusColors = { 'draft':'rgba(26,20,16,0.25)', 'in-progress':'#2E9E9E', 'review':'#6366F1', 'approved':'#059669' };
  const priorityLabels = { 'low':'Low', 'medium':'Medium', 'high':'High', 'critical':'Critical' };
  const priorityColors = { 'low':'rgba(26,20,16,0.25)', 'medium':'#2E9E9E', 'high':'#F97316', 'critical':'#EF4444' };

  // ===== FILTERS =====
  function renderFilters() {
    let total = 0;
    milestones.forEach(m => total += m.task_count || 0);
    // Count tasks by status across all loaded tasks
    const fc = { draft:0, 'in-progress':0, review:0, approved:0, overdue:0 };
    Object.values(tasksByMilestone).forEach(ts => ts.forEach(t => {
      if (fc[t.status] !== undefined) fc[t.status]++;
      if (t.status !== 'approved' && isOverdue(t.due_date)) fc.overdue++;
    }));
    const bar = document.getElementById('filterBar');
    bar.innerHTML = `
      <button class="filter-pill ${statusFilter==='all'?'on':''}" data-filter="all">All<span class="cnt">${total}</span></button>
      <button class="filter-pill ${statusFilter==='in-progress'?'on':''}" data-filter="in-progress">In Progress${fc['in-progress']?'<span class="cnt">'+fc['in-progress']+'</span>':''}</button>
      <button class="filter-pill ${statusFilter==='review'?'on':''}" data-filter="review">Review${fc.review?'<span class="cnt">'+fc.review+'</span>':''}</button>
      <button class="filter-pill ${statusFilter==='draft'?'on':''}" data-filter="draft">Draft${fc.draft?'<span class="cnt">'+fc.draft+'</span>':''}</button>
      <button class="filter-pill ${statusFilter==='approved'?'on':''}" data-filter="approved">Done${fc.approved?'<span class="cnt">'+fc.approved+'</span>':''}</button>
      <button class="filter-pill ${statusFilter==='overdue'?'on':''}" data-filter="overdue">Overdue${fc.overdue?'<span class="cnt">'+fc.overdue+'</span>':''}</button>
    `;
    bar.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        statusFilter = btn.dataset.filter;
        renderFilters();
        render();
      });
    });
  }

  // ===== RENDER =====
  function render() {
    const tl = document.getElementById('timeline');
    if (!milestones.length) {
      tl.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg><p>No milestones yet. Add one to get started.</p></div>';
    } else {
      tl.innerHTML = milestones.map(renderMilestone).join('');
    }
    tl.innerHTML += `<button class="add-milestone-btn" id="addMilestoneBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Milestone</button>`;
    // Sync expand all label
    const eal = document.getElementById('expandAllLabel');
    if (eal) eal.textContent = expandedMilestones.size === milestones.length && milestones.length > 0 ? 'Collapse All' : 'Expand All';
    bindEvents();
  }

  function renderMilestone(m) {
    const exp = expandedMilestones.has(m.id);
    const pct = m.task_count > 0 ? Math.round((m.approved_count / m.task_count) * 100) : 0;
    const done = m.task_count > 0 && m.approved_count === m.task_count;
    const tasks = tasksByMilestone[m.id] || [];

    // Status summary counts
    const sc = { draft:0, 'in-progress':0, review:0, approved:0 };
    tasks.forEach(t => { if (sc[t.status] !== undefined) sc[t.status]++; });

    // Effort sum for milestone
    const effortSum = tasks.reduce((s, t) => s + parseFloat(t.effort_hours || 0), 0);
    const effortRemaining = tasks.filter(t => t.status !== 'approved').reduce((s, t) => s + parseFloat(t.effort_hours || 0), 0);

    return `
      <div class="milestone ${exp ? 'expanded' : ''}" data-id="${m.id}">
        <div class="milestone-dot ${done ? 'complete' : ''}"></div>
        <div class="milestone-card">
          <div class="milestone-header" data-id="${m.id}">
            <div class="milestone-top-row">
              <div class="milestone-title" contenteditable="false" data-id="${m.id}">${esc(m.title)}</div>
              <div class="milestone-actions">
                <button class="task-action-btn del" data-delete-milestone="${m.id}" title="Delete milestone">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
              </div>
              <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="milestone-info">
              <span class="milestone-date" data-edit-mdate="${m.id}" style="cursor:pointer" title="Click to edit date">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                ${fmtDateFull(m.target_date)}
              </span>
              <div class="milestone-progress">
                <div class="progress-bar"><div class="progress-fill ${done ? 'complete' : ''}" style="width:${pct}%"></div></div>
                <div class="progress-text">${m.approved_count || 0}/${m.task_count || 0}</div>
              </div>
              ${effortSum > 0 ? `<span class="milestone-effort"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${effortRemaining > 0 ? effortRemaining.toFixed(0) + 'h left' : 'Done'}</span>` : ''}
            </div>
            ${exp && tasks.length ? renderStatusSummary(sc) : ''}
            ${m.description
              ? '<div class="milestone-desc" contenteditable="false" data-desc-id="' + m.id + '">' + esc(m.description) + '</div>'
              : '<div class="milestone-desc-placeholder" data-add-desc="' + m.id + '">+ add description</div>'}
          </div>
          <div class="task-list" style="${exp ? 'max-height:9999px' : ''}">
            <div class="task-list-inner" data-milestone="${m.id}">
              ${exp ? renderTasks(m.id, tasks) : ''}
            </div>
          </div>
        </div>
      </div>`;
  }

  function renderStatusSummary(sc) {
    let html = '<div class="status-summary">';
    if (sc['in-progress']) html += `<span class="status-summary-pill ssp-in-progress">${sc['in-progress']} active</span>`;
    if (sc.review) html += `<span class="status-summary-pill ssp-review">${sc.review} review</span>`;
    if (sc.draft) html += `<span class="status-summary-pill ssp-draft">${sc.draft} draft</span>`;
    if (sc.approved) html += `<span class="status-summary-pill ssp-approved">${sc.approved} done</span>`;
    html += '</div>';
    return html;
  }

  function renderTasks(mid, tasks) {
    let filtered = tasks;
    if (statusFilter !== 'all') {
      if (statusFilter === 'overdue') {
        filtered = tasks.filter(t => t.status !== 'approved' && isOverdue(t.due_date));
      } else {
        filtered = tasks.filter(t => t.status === statusFilter);
      }
    }
    if (!filtered.length && statusFilter !== 'all') {
      return `<div style="padding:16px 0;font-size:13px;color:var(--t3);text-align:center">No ${statusFilter === 'overdue' ? 'overdue' : statusFilter} tasks</div>` +
        `<div class="add-task-row" data-milestone="${mid}"><button class="add-task-btn" data-milestone="${mid}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add task</button></div>`;
    }
    let html = filtered.map(t => renderTask(t)).join('');
    html += `<div class="add-task-row" data-milestone="${mid}"><button class="add-task-btn" data-milestone="${mid}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add task</button></div>`;
    return html;
  }

  function renderTask(t) {
    const cOpen = openComments.has(t.id);
    const comments = commentsByTask[t.id] || [];
    const overdue = t.status !== 'approved' && isOverdue(t.due_date);
    const pri = t.priority || 'medium';
    const effort = t.effort_hours ? parseFloat(t.effort_hours) : null;

    return `
      <div class="task" data-id="${t.id}" data-status="${t.status}" data-sort="${t.sort_order || 0}">
        <div class="drag-handle" title="Drag to reorder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg></div>
        <button class="task-status-btn" data-status="${t.status}" data-id="${t.id}" title="Click to change status">
          ${statusIcons[t.status] || ''}
        </button>
        <div class="task-body">
          <div class="task-title" contenteditable="false" data-id="${t.id}">${esc(t.title)}</div>
          ${t.description
            ? '<div class="task-desc" contenteditable="false" data-tdesc-id="' + t.id + '">' + esc(t.description) + '</div>'
            : '<div class="task-desc-placeholder" data-add-tdesc="' + t.id + '">+ description</div>'}
          <div class="task-meta">
            <span class="task-badge badge-${t.status}">${statusLabels[t.status]}</span>
            <span class="task-priority priority-${pri}" data-set-priority="${t.id}" title="Click to change priority">${priorityLabels[pri]}</span>
            ${effort !== null ? `<span class="task-effort" data-edit-effort="${t.id}" title="Click to edit effort"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${effort}h</span>` : `<span class="task-effort" data-edit-effort="${t.id}" style="opacity:0.4" title="Add effort estimate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>+ hrs</span>`}
            ${t.due_date ? '<span class="task-due ' + (overdue ? 'overdue' : '') + '" data-edit-tdate="' + t.id + '" style="cursor:pointer" title="Click to edit date"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' + fmtDate(t.due_date) + '</span>' : '<span class="task-due" data-edit-tdate="' + t.id + '" style="cursor:pointer;opacity:0.5">+ date</span>'}
            ${t.assignee ? '<span class="task-assignee" data-assign="' + t.id + '" style="cursor:pointer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' + esc(t.assignee) + '</span>' : '<span class="task-assignee" style="cursor:pointer;opacity:0.5" data-assign="' + t.id + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>assign</span>'}
            <span class="task-comment-count" data-task="${t.id}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              ${t.comment_count || 0}
            </span>
          </div>
          <div class="comment-section ${cOpen ? 'open' : ''}" data-task="${t.id}" style="${cOpen ? 'max-height:9999px' : ''}">
            ${cOpen ? renderComments(t.id, comments) : ''}
          </div>
        </div>
        <div class="task-actions">
          <button class="task-action-btn del" data-delete-task="${t.id}" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>`;
  }

  function renderComments(tid, comments) {
    let html = '<div class="comment-list">';
    if (!comments.length) html += '<div style="font-size:12px;color:var(--t3);padding:4px 0">No comments yet</div>';
    else html += comments.map(c => `
      <div class="comment" data-id="${c.id}">
        <div class="comment-avatar">${initials(c.author_email)}</div>
        <div class="comment-body">
          <div class="comment-header">
            <span class="comment-author">${esc(c.author_email.split('@')[0])}</span>
            <span class="comment-time">${relTime(c.created_at)}</span>
            ${c.author_id === currentUser.id ? '<button class="comment-del" data-del-comment="' + c.id + '">delete</button>' : ''}
          </div>
          <div class="comment-text">${esc(c.content)}</div>
        </div>
      </div>`).join('');
    html += '</div>';
    html += `<div class="comment-input-row"><input class="comment-input" placeholder="Add a comment..." data-task="${tid}"><button class="comment-send" data-send-comment="${tid}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div>`;
    return html;
  }

      } catch (e) { toast('Error: ' + e.message); }
    });

      const allExpanded = expandedMilestones.size === milestones.length;

    // Delete task

  function reRenderMilestone(el) {
    const me = el.closest && el.closest('.milestone');
    if (me) {
      const mid = me.dataset.id;
      const ts = tasksByMilestone[mid] || [];
      const inner = me.querySelector('.task-list-inner');
      if (inner) { inner.innerHTML = renderTasks(mid, ts); bindEvents(); }
    }
  }

  function showStatusDropdown(btn, taskId, cur) {
    if (openStatusDropdown) { openStatusDropdown.remove(); openStatusDropdown = null; }
    const dd = document.createElement('div');
    dd.className = 'status-dropdown';
    dd.innerHTML = Object.entries(statusLabels).map(([k,v]) =>
      `<button class="status-option ${k===cur?'current':''}" data-task="${taskId}" data-status="${k}"><span class="status-dot" style="background:${statusColors[k]}"></span>${v}</button>`
    ).join('');
    const r = btn.getBoundingClientRect();
    dd.style.top = (r.bottom+4)+'px'; dd.style.left = r.left+'px';
    document.body.appendChild(dd);
    openStatusDropdown = dd;
  }

  function showPriorityDropdown(el, taskId) {
    if (openPriorityDropdown) { openPriorityDropdown.remove(); openPriorityDropdown = null; }
    let curPri = 'medium';
    for(const ts of Object.values(tasksByMilestone)){const x=ts.find(v=>v.id===taskId);if(x){curPri=x.priority||'medium';break;}}
    const dd = document.createElement('div');
    dd.className = 'priority-dropdown';
    dd.innerHTML = Object.entries(priorityLabels).map(([k,v]) =>
      `<button class="priority-option ${k===curPri?'current':''}" data-task="${taskId}" data-priority="${k}"><span class="status-dot" style="background:${priorityColors[k]}"></span>${v}</button>`
    ).join('');
    const r = el.getBoundingClientRect();
    dd.style.top = (r.bottom+4)+'px'; dd.style.left = r.left+'px';
    document.body.appendChild(dd);
    openPriorityDropdown = dd;
  }

  async function changeStatus(tid, status) {
    // Store previous status for undo
    let prevStatus = null;
    let parentMid = null;
    for (const [mid, ts] of Object.entries(tasksByMilestone)) { const x=ts.find(v=>v.id===tid); if(x){prevStatus=x.status;parentMid=mid;break;} }
    try {
      await api('/api/tracker-tasks', {method:'PATCH',body:{id:tid,status}});
      for (const ts of Object.values(tasksByMilestone)) { const x=ts.find(v=>v.id===tid); if(x){x.status=status;break;} }
      await loadMilestones(); updateHeaderStats(); renderFilters(); render(); computeAI(); renderBurndown();

      // Flash animation on task row
      const taskEl = document.querySelector('.task[data-id="'+tid+'"]');
      if (taskEl) { taskEl.classList.add('flash'); setTimeout(() => taskEl.classList.remove('flash'), 700); }

      // Animate percentage counter
      animateRingPct();

      // Check if milestone just completed -> confetti!
      if (status === 'approved' && parentMid) {
        const m = milestones.find(x => x.id === parentMid);
        if (m && m.task_count > 0 && m.approved_count === m.task_count) {
          celebrateMilestone(parentMid);
        }
      }

      // Toast with undo
      if (prevStatus && prevStatus !== status) {
        toast(`Status: ${statusLabels[status]}`, () => changeStatus(tid, prevStatus));
      }
    } catch(e) { toast('Error: '+e.message); }
  }

  function celebrateMilestone(mid) {
    // Confetti burst
    const card = document.querySelector('.milestone[data-id="'+mid+'"] .milestone-card');
    if (card) {
      card.classList.add('celebrate');
      setTimeout(() => card.classList.remove('celebrate'), 1500);
      const rect = card.getBoundingClientRect();
      const x = (rect.left + rect.width / 2) / window.innerWidth;
      const y = (rect.top + rect.height / 3) / window.innerHeight;
      if (typeof confetti === 'function') {
        confetti({ particleCount: 80, spread: 70, origin: { x, y }, colors: ['#2E9E9E','#34D399','#6366F1','#33A3A3','#22C55E'], gravity: 0.8, scalar: 0.9 });
        setTimeout(() => confetti({ particleCount: 40, spread: 90, origin: { x: x-0.1, y: y+0.05 }, colors: ['#2E9E9E','#34D399'] }), 200);
      }
    }
    toast('Milestone complete!');
  }

  function animateRingPct() {
    const el = document.getElementById('ringPct');
    const target = parseInt(el.textContent);
    const current = el.dataset.prev !== undefined ? parseInt(el.dataset.prev) : target;
    if (isNaN(target) || isNaN(current) || current === target) { el.dataset.prev = target; return; }
    let val = current;
    const step = target > current ? 1 : -1;
    const interval = setInterval(() => {
      val += step;
      el.textContent = val + '%';
      if (val === target) { clearInterval(interval); el.dataset.prev = target; }
    }, 20);
  }

  async function changePriority(tid, priority) {
    try {
      await api('/api/tracker-tasks', {method:'PATCH',body:{id:tid,priority}});
      for (const ts of Object.values(tasksByMilestone)) { const x=ts.find(v=>v.id===tid); if(x){x.priority=priority;break;} }
      render(); computeAI();
    } catch(e) { toast('Error: '+e.message); }
  }

  async function submitComment(tid, content) {
    if (!content || !content.trim()) return;
    try {
      const c = await api('/api/tracker-comments', {method:'POST',body:{task_id:tid,content:content.trim()}});
      if (!commentsByTask[tid]) commentsByTask[tid] = [];
      commentsByTask[tid].push(c);
      for (const ts of Object.values(tasksByMilestone)) { const x=ts.find(v=>v.id===tid); if(x){x.comment_count=(x.comment_count||0)+1;break;} }
      const taskEl = document.querySelector('.task[data-id="'+tid+'"]');
      if (taskEl) reRenderMilestone(taskEl);
      setTimeout(() => { const inp = document.querySelector('.comment-input[data-task="'+tid+'"]'); if(inp) inp.focus(); }, 50);
    } catch(e) { toast('Error: '+e.message); }
  }

  // ===== DARK MODE =====
  function initTheme() {
    const saved = localStorage.getItem('tracker-theme');
    if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeBtn').addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('tracker-theme', 'light'); }
      else { document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem('tracker-theme', 'dark'); }
    });
  }
  initTheme();

  let cmdOpen = false;
  let focusedTaskIdx = -1;

  const shortcuts = [
    { group: 'Navigation', items: [

      { keys: ['K'], label: 'Previous task' },
