      { keys: ['E'], label: 'Expand all' },
    ]},
    { group: 'Actions', items: [
      { keys: ['C'], label: 'Create new task' },
      { keys: ['S'], label: 'Cycle status forward' },
      { keys: ['1-4'], label: 'Set status (draft/progress/review/done)' },
      { keys: ['D'], label: 'Toggle dark mode' },
    ]},
    { group: 'Global', items: [
      { keys: ['\u2318', 'K'], label: 'Command palette' },
      { keys: ['?'], label: 'Keyboard shortcuts' },
      { keys: ['Esc'], label: 'Close any overlay' },
    ]},
  ];

  function showKBOverlay() {
    if (kbOverlay) return;
    kbOverlay = document.createElement('div');
    kbOverlay.className = 'kb-overlay';
    kbOverlay.innerHTML = `<div class="kb-panel">
      <div class="kb-header"><div class="kb-title">Keyboard Shortcuts</div><button class="kb-close" id="kbClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
      <div class="kb-body">${shortcuts.map(g => `<div class="kb-group"><div class="kb-group-title">${g.group}</div>${g.items.map(i => `<div class="kb-row"><span class="kb-row-label">${i.label}</span><span class="kb-row-keys">${i.keys.map(k => `<kbd>${k}</kbd>`).join('')}</span></div>`).join('')}</div>`).join('')}</div>
    </div>`;
    document.body.appendChild(kbOverlay);
    kbOverlay.addEventListener('click', e => { if (e.target === kbOverlay || e.target.closest('#kbClose')) closeKBOverlay(); });
  }

  function closeKBOverlay() {
    if (kbOverlay) { kbOverlay.remove(); kbOverlay = null; }
  }

  function getAllVisibleTasks() {
    return Array.from(document.querySelectorAll('.task[data-id]'));
  }

  function focusTask(idx) {
    const tasks = getAllVisibleTasks();
    tasks.forEach(t => t.style.outline = '');
    if (idx < 0 || idx >= tasks.length) return;
    focusedTaskIdx = idx;
    const t = tasks[idx];
    t.style.outline = '2px solid var(--teal)';
    t.style.outlineOffset = '-2px';
    t.style.borderRadius = 'var(--r-xs)';
    t.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  document.addEventListener('keydown', e => {
    // Don't handle shortcuts when typing in inputs
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) {
      if (e.key === 'Escape') e.target.blur();
      return;
    }
    // Command palette
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); toggleCmdPalette(); return; }
    if (cmdOpen) return; // let cmd palette handle its own keys
    if (kbOverlay) { if (e.key === 'Escape') closeKBOverlay(); return; }

    const tasks = getAllVisibleTasks();
    switch(e.key) {
      case '?': e.preventDefault(); showKBOverlay(); break;
      case 'j': case 'ArrowDown':
        if (tasks.length) { e.preventDefault(); focusTask(Math.min(focusedTaskIdx + 1, tasks.length - 1)); } break;
      case 'k': case 'ArrowUp':
        if (tasks.length) { e.preventDefault(); focusTask(Math.max(focusedTaskIdx - 1, 0)); } break;
      case 's': {
        if (focusedTaskIdx >= 0 && focusedTaskIdx < tasks.length) {
          const tid = tasks[focusedTaskIdx].dataset.id;
          const btn = tasks[focusedTaskIdx].querySelector('.task-status-btn');
          if (btn) { const nextMap = {'draft':'in-progress','in-progress':'review','review':'approved','approved':'draft'}; changeStatus(tid, nextMap[btn.dataset.status] || 'draft'); }
        } break;
      }
      case '1': case '2': case '3': case '4': {
        const statuses = ['draft','in-progress','review','approved'];
        const si = parseInt(e.key) - 1;
        if (focusedTaskIdx >= 0 && focusedTaskIdx < tasks.length) {
          changeStatus(tasks[focusedTaskIdx].dataset.id, statuses[si]);
        } break;
      }
      case 'c': {
        // Find first expanded milestone and trigger add task
        const addBtn = document.querySelector('.milestone.expanded .add-task-btn');
        if (addBtn) addBtn.click();
        break;
      }
      case 'e': {
        document.getElementById('expandAllBtn').click(); break;
      }
      case 'd': {
        document.getElementById('themeBtn').click(); break;
      }
      case 'Escape':
        focusedTaskIdx = -1;
        tasks.forEach(t => t.style.outline = '');
        break;
    }
  });

  // ===== COMMAND PALETTE =====
  let cmdOverlay = null;

  function toggleCmdPalette() {
    if (cmdOpen) { closeCmdPalette(); return; }
    cmdOpen = true;
    cmdOverlay = document.createElement('div');
    cmdOverlay.className = 'cmd-overlay';

    const items = buildCmdItems();
    cmdOverlay.innerHTML = `<div class="cmd-panel">
      <div class="cmd-input-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="cmd-input" id="cmdInput" placeholder="Search tasks, milestones, actions..." autofocus></div>
      <div class="cmd-results" id="cmdResults"></div>
      <div class="cmd-footer"><kbd>\u2191\u2193</kbd> navigate <kbd>Enter</kbd> select <kbd>Esc</kbd> close</div>
    </div>`;
    document.body.appendChild(cmdOverlay);

    const input = document.getElementById('cmdInput');
    const results = document.getElementById('cmdResults');
    let activeIdx = 0;

    function renderResults(query) {
      const filtered = query ? items.filter(i => i.title.toLowerCase().includes(query) || (i.sub||'').toLowerCase().includes(query)) : items;
      activeIdx = 0;
      if (!filtered.length) { results.innerHTML = '<div class="cmd-empty">No results</div>'; return; }
      results.innerHTML = filtered.map((item, i) => `<div class="cmd-item ${i===0?'active':''}" data-idx="${i}" data-action="${item.action}" data-id="${item.id||''}">
        <div class="cmd-item-icon">${item.icon}</div>
        <div class="cmd-item-body"><div class="cmd-item-title">${item.title}</div>${item.sub ? '<div class="cmd-item-sub">'+item.sub+'</div>' : ''}</div>
        ${item.badge ? '<span class="cmd-item-badge">'+item.badge+'</span>' : ''}
      </div>`).join('');
    }

    renderResults('');

    input.addEventListener('input', () => renderResults(input.value.toLowerCase().trim()));

    input.addEventListener('keydown', e => {
      const items2 = results.querySelectorAll('.cmd-item');
      if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items2.length-1); items2.forEach((el,i) => el.classList.toggle('active', i===activeIdx)); items2[activeIdx]?.scrollIntoView({block:'nearest'}); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx-1, 0); items2.forEach((el,i) => el.classList.toggle('active', i===activeIdx)); items2[activeIdx]?.scrollIntoView({block:'nearest'}); }
      else if (e.key === 'Enter') { e.preventDefault(); const active = items2[activeIdx]; if (active) executeCmdItem(active); }
      else if (e.key === 'Escape') { closeCmdPalette(); }
    });

    results.addEventListener('click', e => {
      const item = e.target.closest('.cmd-item');
      if (item) executeCmdItem(item);
    });
    cmdOverlay.addEventListener('click', e => { if (e.target === cmdOverlay) closeCmdPalette(); });
  }

  function closeCmdPalette() {
    if (cmdOverlay) { cmdOverlay.remove(); cmdOverlay = null; }
    cmdOpen = false;
  }

  function buildCmdItems() {
    const items = [];
    // Tasks
    allTasks.forEach(t => {
      const m = milestones.find(x => Object.entries(tasksByMilestone).some(([mid, ts]) => ts.includes(t) && mid === x.id));
      items.push({ icon: statusIcons[t.status] || '\u25CB', title: t.title, sub: m ? m.title : '', badge: statusLabels[t.status], action: 'focus-task', id: t.id });
    });
    // Milestones
    milestones.forEach(m => {
      const pct = m.task_count > 0 ? Math.round((m.approved_count / m.task_count) * 100) : 0;
      items.push({ icon: '\uD83C\uDFAF', title: m.title, sub: fmtDateFull(m.target_date), badge: pct + '%', action: 'focus-milestone', id: m.id });
    });
    // Actions
    items.push({ icon: '\u2795', title: 'Create new task', sub: 'Add a task to the first expanded milestone', action: 'new-task' });
    items.push({ icon: '\u2795', title: 'Create new milestone', sub: '', action: 'new-milestone' });
    items.push({ icon: '\uD83C\uDF19', title: 'Toggle dark mode', sub: '', action: 'toggle-theme' });
    items.push({ icon: '\u2699\uFE0F', title: 'Open settings', sub: 'Change launch date', action: 'open-settings' });
    items.push({ icon: '\u2328\uFE0F', title: 'Keyboard shortcuts', sub: '', action: 'show-kb' });
    return items;
  }

  function executeCmdItem(el) {
    const action = el.dataset.action;
    const id = el.dataset.id;
    closeCmdPalette();
    switch(action) {
      case 'focus-task': {
        // Find which milestone contains this task, expand it, then highlight
        for (const [mid, ts] of Object.entries(tasksByMilestone)) {
          if (ts.find(t => t.id === id)) {
            if (!expandedMilestones.has(mid)) { expandedMilestones.add(mid); render(); }
            setTimeout(() => {
              const taskEl = document.querySelector('.task[data-id="'+id+'"]');
              if (taskEl) { taskEl.scrollIntoView({ block:'center', behavior:'smooth' }); taskEl.classList.add('flash'); setTimeout(() => taskEl.classList.remove('flash'), 700); }
            }, 100);
            break;
          }
        }
        break;
      }
      case 'focus-milestone': {
        if (!expandedMilestones.has(id)) { expandedMilestones.add(id); if (!tasksByMilestone[id]) loadTasks(id).then(() => render()); else render(); }
        setTimeout(() => {
          const mel = document.querySelector('.milestone[data-id="'+id+'"]');
          if (mel) mel.scrollIntoView({ block:'start', behavior:'smooth' });
        }, 100);
        break;
      }
      case 'new-task': {
        const addBtn = document.querySelector('.milestone.expanded .add-task-btn');
        if (addBtn) addBtn.click(); else toast('Expand a milestone first');
        break;
      }
      case 'new-milestone': {
        const addBtn = document.getElementById('addMilestoneBtn');
        if (addBtn) addBtn.click();
        break;
      }
      case 'toggle-theme': document.getElementById('themeBtn').click(); break;
      case 'open-settings': document.getElementById('configBar').classList.toggle('open'); break;
      case 'show-kb': showKBOverlay(); break;
    }
  }

  // ===== BURNDOWN CHART =====
  function renderBurndown() {
    if (!config || !allTasks.length) { document.getElementById('burndownWrap').style.display = 'none'; return; }

    const now = new Date(); now.setHours(0,0,0,0);
    const ld = new Date(config.launch_date + 'T00:00:00');
    const total = allTasks.length;
    if (total === 0) return;

    // Find the project start (earliest due_date or created_at)
    const allDates = allTasks.map(t => t.due_date || t.created_at?.split('T')[0]).filter(Boolean).map(d => new Date(d.split('T')[0] + 'T00:00:00'));
    if (!allDates.length) return;
    const projectStart = new Date(Math.min(...allDates));
    const projectEnd = ld > now ? ld : now;
    const totalDays = Math.max(1, Math.ceil((projectEnd - projectStart) / 86400000));

    // Build actual burndown data points (daily remaining count)
    // Group completed tasks by their completion date (approximated by updated_at)
    const completedByDay = {};
    allTasks.filter(t => t.status === 'approved').forEach(t => {
      const d = (t.updated_at || t.created_at || '').split('T')[0];
      if (d) completedByDay[d] = (completedByDay[d] || 0) + 1;
    });

    // Build cumulative completion over time
    const points = [];
    let cumDone = 0;
    for (let i = 0; i <= totalDays; i++) {
      const day = new Date(projectStart);
      day.setDate(day.getDate() + i);
      const dayStr = day.toISOString().split('T')[0];
      cumDone += (completedByDay[dayStr] || 0);
      if (day <= now) points.push({ day: i, remaining: total - cumDone });
    }
    if (!points.length) points.push({ day: 0, remaining: total });

    // SVG dimensions
    const w = 480, h = 120, pad = { top: 8, right: 12, bottom: 20, left: 30 };
    const chartW = w - pad.left - pad.right;
    const chartH = h - pad.top - pad.bottom;

    // Scales
    const xScale = d => pad.left + (d / totalDays) * chartW;
    const yScale = r => pad.top + (1 - r / total) * chartH;

    // Today position
    const todayDay = Math.ceil((now - projectStart) / 86400000);

    let svg = '';
    // Grid lines
    for (let i = 0; i <= 4; i++) {
      const y = pad.top + (i / 4) * chartH;
      svg += `<line class="grid-line" x1="${pad.left}" y1="${y}" x2="${w-pad.right}" y2="${y}"/>`;
      svg += `<text class="label" x="${pad.left-4}" y="${y+3}" text-anchor="end">${Math.round(total * (1 - i/4))}</text>`;
    }

    // X-axis labels
    const labelCount = Math.min(5, totalDays);
    for (let i = 0; i <= labelCount; i++) {
      const day = Math.round((i / labelCount) * totalDays);
      const date = new Date(projectStart); date.setDate(date.getDate() + day);
      const label = date.toLocaleDateString('en-US', { month:'short', day:'numeric' });
      svg += `<text class="label" x="${xScale(day)}" y="${h-2}" text-anchor="middle">${label}</text>`;
    }

    // Ideal line (straight from total to 0)
    svg += `<line class="ideal-line" x1="${xScale(0)}" y1="${yScale(total)}" x2="${xScale(totalDays)}" y2="${yScale(0)}"/>`;

    // Today line
    if (todayDay > 0 && todayDay < totalDays) {
      svg += `<line class="today-line" x1="${xScale(todayDay)}" y1="${pad.top}" x2="${xScale(todayDay)}" y2="${h-pad.bottom}"/>`;
    }

    // Actual line + fill
    if (points.length > 1) {
      const linePts = points.map(p => `${xScale(p.day)},${yScale(p.remaining)}`).join(' ');
      const fillPts = linePts + ` ${xScale(points[points.length-1].day)},${yScale(0)} ${xScale(points[0].day)},${yScale(0)}`;
      svg += `<polygon class="actual-fill" points="${fillPts}"/>`;
      svg += `<polyline class="actual-line" points="${linePts}"/>`;
      // Dots
      points.forEach(p => { svg += `<circle class="dot" cx="${xScale(p.day)}" cy="${yScale(p.remaining)}"/>`; });
    }

    document.getElementById('burndownSvg').innerHTML = svg;
    document.getElementById('burndownSubtitle').textContent = `${points[points.length-1]?.remaining || total} tasks remaining`;
    document.getElementById('burndownWrap').style.display = '';
  }

  // ===== DRAG AND DROP =====
  function initSortable() {
    document.querySelectorAll('.task-list-inner[data-milestone]').forEach(container => {
      if (container._sortable) container._sortable.destroy();
      container._sortable = new Sortable(container, {
        handle: '.drag-handle',
        animation: 180,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        draggable: '.task',
        filter: '.add-task-row,.inline-form',
        onEnd: async (evt) => {
          const mid = container.dataset.milestone;
          const tasks = tasksByMilestone[mid];
          if (!tasks) return;
          // Rebuild sort order from DOM order
          const taskEls = container.querySelectorAll('.task[data-id]');
          const newOrder = [];
          taskEls.forEach((el, i) => {
            const t = tasks.find(x => x.id === el.dataset.id);
            if (t) { t.sort_order = i; newOrder.push({ id: t.id, sort_order: i }); }
          });
          // Persist new order
          for (const item of newOrder) {
            try { await api('/api/tracker-tasks', { method: 'PATCH', body: { id: item.id, sort_order: item.sort_order } }); } catch(e) { /* silent */ }
          }
        }
      });
    });
  }

  // Hook into render to re-init sortable
  const origRender = render;
  render = function() {
    origRender();
    setTimeout(initSortable, 50);
  };

  // Also render burndown after data loads
  const origComputeAI = computeAI;
  computeAI = async function() {
    await origComputeAI();
    renderBurndown();
  };

  checkAuth();
})();
</script>
