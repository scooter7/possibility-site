<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Copy Review | The Possibility</title>
<style>
  :root{
    --teal:#2E9E9E;
    --teal-bright:#33A3A3;
    --teal-soft:rgba(51,163,163,0.08);
    --teal-glow:rgba(51,163,163,0.14);
    --ink:#1a1410;
    --ink-soft:rgba(26,20,16,0.6);
    --ink-faint:rgba(26,20,16,0.4);
    --line:rgba(26,20,16,0.08);
    --line-strong:rgba(26,20,16,0.16);
    --cream:#faf7f2;
    --card:#ffffff;
    --open:#d97706;
    --open-soft:rgba(217,119,6,0.1);
    --progress:#2563eb;
    --progress-soft:rgba(37,99,235,0.1);
    --resolved:#16a34a;
    --resolved-soft:rgba(22,163,74,0.1);
    --safe-top:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--cream);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;height:100%;height:100dvh}
  body{display:flex;flex-direction:column;overflow:hidden;padding-top:var(--safe-top);overscroll-behavior:none}
  button{-webkit-tap-highlight-color:transparent}

  .auth-gate{position:fixed;inset:0;z-index:9999;background:var(--cream);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
  .auth-gate .brand{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--teal)}
  .auth-gate .title{font-size:22px;font-weight:600;letter-spacing:-.5px}
  .spinner{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite;margin-top:6px}
  @keyframes spin{to{transform:rotate(360deg)}}

  header{flex-shrink:0;background:rgba(250,247,242,0.92);backdrop-filter:saturate(140%) blur(12px);border-bottom:1px solid var(--line);z-index:50}
  .header-inner{max-width:1700px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px}
  .header-left{display:flex;align-items:center;gap:14px;min-width:0}
  .menu-btn{display:none;background:#fff;border:1px solid var(--line);width:38px;height:38px;border-radius:10px;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);flex-shrink:0}
  .menu-btn svg{width:18px;height:18px}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--teal-bright));display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
  .brand-mark svg{width:18px;height:18px}
  .brand-text{min-width:0}
  .brand-title{font-size:17px;font-weight:600;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand-sub{font-size:12px;color:var(--ink-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .header-right{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft);flex-shrink:0}
  .user-chip{display:flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(--line);border-radius:999px;background:#fff}
  .avatar{width:22px;height:22px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}
  .icon-btn{background:#fff;border:1px solid var(--line);width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);flex-shrink:0}
  .icon-btn:hover{color:var(--ink);border-color:var(--line-strong)}
  .icon-btn svg{width:16px;height:16px}

  .workspace{flex:1;display:grid;grid-template-columns:240px 1fr 400px;min-height:0;width:100%;max-width:1700px;margin:0 auto}

  .drawer-backdrop{display:none;position:fixed;inset:0;background:rgba(15,12,9,0.5);z-index:90;opacity:0;transition:opacity .2s}
  .drawer-backdrop.show{display:block;opacity:1}

  .fab-comments{display:none;position:relative;height:36px;padding:0 12px 0 10px;border-radius:999px;background:var(--ink);color:#fff;border:none;cursor:pointer;align-items:center;gap:6px;font:inherit;font-size:13px;font-weight:600;flex-shrink:0}
  .fab-comments svg{width:16px;height:16px}
  .fab-comments .fab-count{background:rgba(255,255,255,0.22);min-width:20px;height:20px;border-radius:999px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 6px}
  .fab-comments .fab-count.has-open{background:var(--open);color:#fff}

  .sheet-grab{display:none;padding:10px 0 6px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  .sheet-handle{width:44px;height:5px;border-radius:3px;background:var(--line-strong);margin:0 auto;pointer-events:none}
  .sheet-close{display:none;position:absolute;top:8px;right:10px;background:#fff;border:1px solid var(--line);color:var(--ink);cursor:pointer;width:40px;height:40px;align-items:center;justify-content:center;border-radius:10px;z-index:10;touch-action:manipulation;-webkit-tap-highlight-color:transparent;font-family:inherit}
  .sheet-close:active{background:var(--cream)}
  .sheet-close svg{width:18px;height:18px;pointer-events:none}

  /* Left sidebar (flows) */
  .flows-side{background:#fff;border-right:1px solid var(--line);overflow-y:auto;padding:14px 10px;-webkit-overflow-scrolling:touch}
  .flows-side::-webkit-scrollbar{width:6px}
  .flows-side::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:3px}
  .flows-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);padding:8px 12px 6px}
  .flow-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;background:none;border:none;border-radius:8px;font:inherit;font-size:13.5px;color:var(--ink-soft);cursor:pointer;text-align:left;font-weight:500;margin-bottom:1px;transition:all .12s}
  .flow-btn:hover{background:var(--cream);color:var(--ink)}
  .flow-btn.active{background:var(--teal-soft);color:var(--teal);font-weight:600}
  .flow-num{font-variant-numeric:tabular-nums;color:var(--ink-faint);font-size:11px;font-weight:600;width:18px;flex-shrink:0}
  .flow-btn.active .flow-num{color:var(--teal)}
  .flow-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .flow-count{font-size:11px;font-weight:600;padding:2px 7px;border-radius:999px;background:var(--line);color:var(--ink-soft);min-width:22px;text-align:center}
  .flow-count.has-open{background:var(--open-soft);color:var(--open)}
  .flow-btn.active .flow-count{background:#fff}

  .stage{position:relative;display:flex;align-items:center;justify-content:center;padding:28px 24px;background:linear-gradient(180deg,#f4f0ea 0%,#ece7de 100%);min-height:0;overflow:hidden}
  .stage-inner{position:relative;height:100%;max-height:880px;display:flex;align-items:center;justify-content:center}
  .phone{height:100%;aspect-ratio:1206/2622;background:#1a1410;border-radius:44px;padding:6px;box-shadow:0 30px 80px rgba(26,20,16,0.2),0 8px 20px rgba(26,20,16,0.08)}
  .phone-inner{width:100%;height:100%;background:#000;border-radius:38px;overflow:hidden;cursor:zoom-in;position:relative;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:.05em;text-transform:uppercase}
  .phone-inner img{width:100%;height:100%;object-fit:cover;display:block}

  .nav-btn{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.95);border:1px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);box-shadow:0 4px 14px rgba(26,20,16,0.08);transition:all .15s;z-index:5}
  .nav-btn:hover:not(:disabled){background:#fff;transform:translateY(-50%) scale(1.05);border-color:var(--line-strong)}
  .nav-btn:disabled{opacity:.3;cursor:not-allowed}
  .nav-btn svg{width:20px;height:20px}
  .nav-prev{left:24px}
  .nav-next{right:24px}

  .stage-overlay-top{position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:999px;padding:8px 16px;font-size:12px;color:var(--ink-soft);box-shadow:0 4px 14px rgba(26,20,16,0.06);z-index:5;max-width:calc(100% - 140px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stage-overlay-top strong{color:var(--ink);font-weight:600}
  .stage-overlay-top .sep{color:var(--ink-faint)}

  .stage-overlay-bottom{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;z-index:5;max-width:calc(100% - 140px);overflow-x:auto;scrollbar-width:none;padding:4px 8px}
  .stage-overlay-bottom::-webkit-scrollbar{display:none}
  .dot-nav{width:7px;height:7px;border-radius:50%;background:rgba(26,20,16,0.18);cursor:pointer;transition:all .15s;border:none;padding:0;flex-shrink:0}
  .dot-nav:hover{background:rgba(26,20,16,0.35)}
  .dot-nav.active{background:var(--teal);width:22px;border-radius:4px}

  .sidebar{display:flex;flex-direction:column;background:#fff;min-height:0;border-left:1px solid var(--line)}
  .side-head{padding:22px 24px 16px;border-bottom:1px solid var(--line);flex-shrink:0}
  .side-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
  .side-title{font-size:18px;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
  .side-filename{font-size:11px;color:var(--ink-faint);margin-top:3px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;word-break:break-all}
  .side-status{display:flex;gap:6px;flex-wrap:wrap}
  .status-pill{font-size:11px;font-weight:600;padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--ink-soft);display:flex;align-items:center;gap:6px;transition:all .15s;font-family:inherit}
  .status-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .status-pill:hover{border-color:var(--line-strong)}
  .status-pill.active.open{background:var(--open-soft);color:var(--open);border-color:var(--open)}
  .status-pill.active.progress{background:var(--progress-soft);color:var(--progress);border-color:var(--progress)}
  .status-pill.active.resolved{background:var(--resolved-soft);color:var(--resolved);border-color:var(--resolved)}

  .comments-scroll{flex:1;overflow-y:auto;padding:8px 24px}
  .comments-scroll::-webkit-scrollbar{width:6px}
  .comments-scroll::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:3px}
  .comments-empty{text-align:center;padding:40px 20px;color:var(--ink-faint);font-size:13px}
  .comments-loading{display:flex;justify-content:center;padding:30px}

  .comment{display:flex;gap:11px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--line);position:relative}
  .comment:last-child{border-bottom:none}
  .comment-check{margin-top:5px;width:15px;height:15px;cursor:pointer;accent-color:var(--teal);flex-shrink:0}
  .comment .avatar{width:28px;height:28px;font-size:11px;flex-shrink:0;margin-top:1px}
  .comment-body{flex:1;min-width:0}
  .comment-head{display:flex;align-items:baseline;gap:8px;font-size:12px;margin-bottom:2px}
  .comment-name{font-weight:600;color:var(--ink)}
  .comment-time{color:var(--ink-faint);font-size:11px}
  .comment-text{font-size:13.5px;color:var(--ink);line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
  .comment.done .comment-text{text-decoration:line-through;color:var(--ink-faint)}
  .comment-delete{position:absolute;right:0;top:14px;background:none;border:none;color:var(--ink-faint);cursor:pointer;padding:4px;display:none;font-family:inherit}
  .comment-delete:hover{color:#dc2626}
  .comment.own:hover .comment-delete{display:block}

  .composer{flex-shrink:0;padding:14px 24px 18px;border-top:1px solid var(--line);background:#fff}
  .composer-inner{display:flex;gap:8px;align-items:flex-end}
  .composer textarea{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;font-size:13.5px;resize:none;background:var(--cream);color:var(--ink);min-height:42px;max-height:120px;font-family:inherit;line-height:1.4}
  .composer textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow);background:#fff}
  .send-btn{background:var(--teal);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;height:42px;flex-shrink:0;transition:background .15s;font-family:inherit}
  .send-btn:hover{background:var(--teal-bright)}
  .send-btn:disabled{opacity:.5;cursor:not-allowed}
  .composer-hint{font-size:11px;color:var(--ink-faint);margin-top:8px;display:flex;gap:14px;flex-wrap:wrap}
  kbd{background:var(--line);border-radius:4px;padding:1px 6px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;color:var(--ink-soft)}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 30px;color:var(--ink-soft);grid-column:1/-1;background:var(--cream);min-height:60vh}
  .empty-state h2{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:8px}
  .empty-state p{font-size:13px;max-width:400px;line-height:1.6}
  .empty-state code{background:var(--line);padding:2px 6px;border-radius:4px;font-size:12px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:all .2s;z-index:200}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .lightbox{position:fixed;inset:0;background:rgba(15,12,9,0.94);z-index:100;display:none;align-items:center;justify-content:center;padding:40px;cursor:zoom-out}
  .lightbox.show{display:flex}
  .lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:14px;box-shadow:0 30px 80px rgba(0,0,0,0.5)}

  @media (max-width:1200px){
    .workspace{grid-template-columns:210px 1fr 380px}
  }
  @media (max-width:1000px){
    .workspace{grid-template-columns:200px 1fr;grid-template-rows:1fr auto}
    .sidebar{grid-column:1/-1;border-left:none;border-top:1px solid var(--line);max-height:48vh}
    .stage{padding:20px 16px}
  }
  @media (max-width:760px){
    .menu-btn{display:flex}
    .brand-mark{display:none}
    .brand-sub{display:none}
    .header-inner{padding:8px 12px;gap:8px}
    .header-right{gap:6px}
    .header-right .user-chip{display:none}
    .header-right #logoutBtn{display:none}
    .icon-btn{width:36px;height:36px}
    .menu-btn{width:36px;height:36px}
    .fab-comments{display:flex}
    .brand-title{font-size:14px;font-weight:600}
    .brand-text .brand-pos{display:block;font-size:11px;color:var(--ink-faint);margin-top:1px}

    .workspace{grid-template-columns:1fr;grid-template-rows:1fr}

    .flows-side{position:fixed;top:0;left:0;bottom:0;width:78vw;max-width:320px;z-index:100;transform:translateX(-100%);transition:transform .25s ease;border-right:1px solid var(--line);box-shadow:0 30px 80px rgba(0,0,0,0.18);padding-top:calc(var(--safe-top) + 14px)}
    .flows-side.open{transform:translateX(0)}

    .stage{padding:6px 4px;min-height:0;height:100%}
    .stage-inner{max-height:none}
    .stage-overlay-top{display:none}
    .stage-overlay-bottom{display:none}
    .nav-btn{display:none}
    .phone{padding:4px;border-radius:36px}
    .phone-inner{border-radius:32px}

    /* Comments sidebar becomes a bottom sheet, hidden by default */
    .sidebar{position:fixed;left:0;right:0;bottom:0;top:auto;z-index:95;border-top:1px solid var(--line);border-left:none;max-height:88dvh;height:auto;border-radius:18px 18px 0 0;box-shadow:0 -20px 60px rgba(15,12,9,0.25);transform:translateY(100%);transition:transform .28s ease;padding-bottom:env(safe-area-inset-bottom,0px)}
    .sidebar.open{transform:translateY(0)}
    .sheet-grab{display:block}
    .sheet-close{display:flex}
    .side-head{padding:4px 18px 12px;position:relative}
    .side-title-row{margin-bottom:8px;padding-right:48px}
    .side-title{font-size:16px}
    .comments-scroll{padding:4px 18px;max-height:50dvh;-webkit-overflow-scrolling:touch}
    .composer{padding:12px 18px calc(14px + env(safe-area-inset-bottom,0px))}
    .composer-hint{display:none}
    .composer textarea{font-size:16px}
    .send-btn{font-size:14px}
    .status-pill{padding:8px 13px;font-size:12px}

    .comment-delete{display:block;opacity:.5}
    .comment-check{width:18px;height:18px}
  }
</style>
</head>
<body>

<div class="auth-gate" id="authGate">
  <div class="brand">Possibility</div>
  <div class="title">Copy Review</div>
  <div class="spinner"></div>
</div>

<div class="toast" id="toast"></div>

<header>
  <div class="header-inner">
    <div class="header-left">
      <button class="menu-btn" id="menuBtn" aria-label="Open flows">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
      </button>
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="brand-text">
          <div class="brand-title" id="headerTitle">Copy Review</div>
          <div class="brand-sub">iPhone screenshots, comments, and copy fixes</div>
          <div class="brand-pos" id="brandPos" style="display:none"></div>
        </div>
      </div>
    </div>
    <div class="header-right">
      <button class="fab-comments" id="fabComments" aria-label="Comments">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="fab-count" id="fabCount">0</span>
      </button>
      <div class="user-chip"><div class="avatar" id="userInitials">··</div><span id="userName">…</span></div>
      <button class="icon-btn" id="logoutBtn" title="Log out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="drawer-backdrop" id="drawerBackdrop"></div>

<div class="workspace" id="workspace">
  <nav class="flows-side" id="flowsSide">
    <div class="flows-label">Flows</div>
  </nav>
  <div class="stage" id="stage">
    <button class="nav-btn nav-prev" id="prevBtn" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>

    <div class="stage-overlay-top" id="stageOverlayTop">
      <strong id="shotIndex">–</strong>
      <span class="sep">of</span>
      <span id="shotTotal">–</span>
      <span class="sep">·</span>
      <span id="shotLabel">Loading…</span>
    </div>

    <div class="stage-inner">
      <div class="phone"><div class="phone-inner" id="phoneInner">Loading…</div></div>
    </div>

    <div class="stage-overlay-bottom" id="dotNav"></div>

    <button class="nav-btn nav-next" id="nextBtn" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <aside class="sidebar" id="commentsSheet">
    <div class="sheet-grab" id="sheetGrab"><div class="sheet-handle"></div></div>
    <button class="sheet-close" id="sheetClose" aria-label="Close" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
    <div class="side-head">
      <div class="side-title-row">
        <div>
          <div class="side-title" id="sideTitle">–</div>
          <div class="side-filename" id="sideFilename">–</div>
        </div>
      </div>
      <div class="side-status" id="sideStatus">
        <button class="status-pill open" data-status="open"><span class="dot"></span>Open</button>
        <button class="status-pill progress" data-status="progress"><span class="dot"></span>In progress</button>
        <button class="status-pill resolved" data-status="resolved"><span class="dot"></span>Resolved</button>
      </div>
    </div>
    <div class="comments-scroll" id="commentsScroll">
      <div class="comments-loading"><div class="spinner"></div></div>
    </div>
    <div class="composer">
      <div class="composer-inner">
        <textarea id="composerText" placeholder="Suggest a copy change…" rows="1"></textarea>
        <button class="send-btn" id="sendBtn">Post</button>
      </div>
      <div class="composer-hint">
        <span><kbd>←</kbd> <kbd>→</kbd> navigate</span>
        <span><kbd>⌘</kbd>+<kbd>↵</kbd> post</span>
      </div>
    </div>
  </aside>
</div>

<div class="lightbox" id="lightbox"><img id="lightboxImg" alt=""></div>

<script>
(function(){
  let currentUser = null;
  let manifest = null;
  let dbScreenshots = {}; // key: `${flow}/${filename}` -> row
  let dbComments = {};    // key: screenshot_id -> comments[]
  let currentFlowSlug = null;
  let currentIdx = 0;

  const $ = id => document.getElementById(id);

  // ---------- API ----------
  async function api(url, opts = {}) {
    const res = await fetch(url, {
      ...opts,
      headers: { 'Content-Type': 'application/json', ...(opts.headers||{}) },
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
    if (res.status === 401) { window.location.href = '/login'; return null; }
    const data = await res.json().catch(()=>({}));
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  function toast(msg) {
    const el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  function initialsOf(name) {
    if (!name) return '··';
    return name.trim().split(/\s+/).map(p=>p[0]).join('').slice(0,2).toUpperCase();
  }

  function timeAgo(iso) {
    const d = new Date(iso);
    const s = Math.floor((Date.now() - d.getTime())/1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    if (s < 604800) return Math.floor(s/86400) + 'd ago';
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  function colorForName(name) {
    if (!name) return '#888';
    let h = 0;
    for (let i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) >>> 0;
    const palette = ['#2E9E9E','#7c3aed','#db2777','#2563eb','#d97706','#16a34a','#dc2626','#0891b2'];
    return palette[h % palette.length];
  }

  // ---------- AUTH ----------
  async function checkAuth() {
    try {
      const res = await fetch('/api/auth/me');
      if (!res.ok) throw new Error();
      currentUser = await res.json();
      const name = currentUser.user_metadata?.name || currentUser.user_metadata?.full_name || (currentUser.email||'').split('@')[0];
      $('userName').textContent = name;
      $('userInitials').textContent = initialsOf(name);
      $('authGate').style.display = 'none';
      init();
    } catch { window.location.href = '/login'; }
  }

  // ---------- LOAD ----------
  async function init() {
    try {
      const [m, shots] = await Promise.all([
        fetch('/screenshots/manifest.json').then(r => r.ok ? r.json() : { flows: [] }),
        api('/api/copy-review-screenshots')
      ]);
      manifest = m;
      (shots||[]).forEach(s => { dbScreenshots[`${s.flow}/${s.filename}`] = s; });

      if (!manifest.flows || !manifest.flows.length) {
        $('workspace').innerHTML = `
          <div class="empty-state">
            <h2>No screenshots yet</h2>
            <p>Drop iPhone screenshots into <code>public/screenshots/&lt;flow-name&gt;/</code> on disk, then push. Each subfolder becomes a flow here. Files are sorted by name (use <code>01-</code>, <code>02-</code> prefixes to control order).</p>
          </div>`;
        return;
      }

      currentFlowSlug = manifest.flows[0].slug;
      renderFlowsNav();
      await loadFlow();
      bindEvents();
    } catch (err) {
      console.error(err);
      toast('Failed to load: ' + err.message);
    }
  }

  function currentFlow() {
    return manifest.flows.find(f => f.slug === currentFlowSlug);
  }

  function currentShot() {
    const f = currentFlow();
    return f ? f.shots[currentIdx] : null;
  }

  async function ensureRow(flowSlug, filename) {
    const key = `${flowSlug}/${filename}`;
    if (dbScreenshots[key]) return dbScreenshots[key];
    const row = await api('/api/copy-review-screenshots', {
      method: 'POST', body: { flow: flowSlug, filename }
    });
    dbScreenshots[key] = row;
    return row;
  }

  async function loadFlow() {
    currentIdx = 0;
    await renderShot();
  }

  async function loadComments(screenshotId) {
    if (dbComments[screenshotId]) return dbComments[screenshotId];
    const list = await api('/api/copy-review-comments?screenshot_id=' + screenshotId);
    dbComments[screenshotId] = list || [];
    return dbComments[screenshotId];
  }

  // ---------- RENDER ----------
  function renderFlowsNav() {
    const nav = $('flowsSide');
    const items = manifest.flows.map((f, i) => {
      const openCount = f.shots.filter(s => {
        const r = dbScreenshots[`${f.slug}/${s.filename}`];
        return !r || r.status !== 'resolved';
      }).length;
      const numMatch = f.slug.match(/^(\d+)/);
      const num = numMatch ? numMatch[1] : (i+1).toString().padStart(2,'0');
      const cls = openCount > 0 ? 'has-open' : '';
      return `<button class="flow-btn ${f.slug===currentFlowSlug?'active':''}" data-slug="${f.slug}">
        <span class="flow-num">${num}</span>
        <span class="flow-name">${f.title}</span>
        <span class="flow-count ${cls}">${openCount}/${f.shots.length}</span>
      </button>`;
    }).join('');
    nav.innerHTML = `<div class="flows-label">Flows</div>${items}`;
    nav.querySelectorAll('.flow-btn').forEach(b => {
      b.addEventListener('click', async () => {
        currentFlowSlug = b.dataset.slug;
        renderFlowsNav();
        closeDrawer();
        await loadFlow();
      });
    });
    const flow = currentFlow();
    if (flow && window.matchMedia('(max-width:760px)').matches) {
      $('headerTitle').textContent = flow.title;
    }
  }

  function openDrawer() {
    $('flowsSide').classList.add('open');
    $('drawerBackdrop').classList.add('show');
  }
  function closeDrawer() {
    $('flowsSide').classList.remove('open');
    $('drawerBackdrop').classList.remove('show');
  }
  function openSheet() {
    $('commentsSheet').classList.add('open');
    $('drawerBackdrop').classList.add('show');
  }
  function closeSheet() {
    $('commentsSheet').classList.remove('open');
    $('drawerBackdrop').classList.remove('show');
  }
  function updateFabCount(list, status) {
    const open = (list||[]).filter(c => !c.done).length;
    const fab = $('fabCount');
    fab.textContent = open;
    fab.classList.toggle('has-open', open > 0 && status !== 'resolved');
  }

  async function renderShot() {
    const flow = currentFlow();
    const shot = currentShot();
    if (!shot) return;

    $('shotIndex').textContent = currentIdx + 1;
    $('shotTotal').textContent = flow.shots.length;
    $('shotLabel').textContent = shot.label;
    if (window.matchMedia('(max-width:760px)').matches) {
      $('headerTitle').textContent = flow.title;
      const pos = $('brandPos');
      pos.textContent = `${currentIdx+1}/${flow.shots.length} · ${shot.label}`;
      pos.style.display = 'block';
    }
    $('sideTitle').textContent = shot.label;
    $('sideFilename').textContent = `${flow.slug}/${shot.filename}`;
    $('phoneInner').innerHTML = `<img src="${shot.url}" alt="${shot.label}" loading="lazy">`;
    $('prevBtn').disabled = currentIdx === 0;
    $('nextBtn').disabled = currentIdx === flow.shots.length - 1;

    // dot nav
    $('dotNav').innerHTML = flow.shots.map((s,i) =>
      `<button class="dot-nav ${i===currentIdx?'active':''}" data-i="${i}" title="${s.label}"></button>`
    ).join('');
    $('dotNav').querySelectorAll('.dot-nav').forEach(d => {
      d.addEventListener('click', async () => { currentIdx = parseInt(d.dataset.i); await renderShot(); });
    });

    // ensure row exists & render status + comments
    const row = await ensureRow(flow.slug, shot.filename);
    renderStatus(row);
    $('commentsScroll').innerHTML = `<div class="comments-loading"><div class="spinner"></div></div>`;
    const comments = await loadComments(row.id);
    renderComments(row, comments);
    updateFabCount(comments, row.status);
    renderFlowsNav(); // refresh open counts
  }

  function renderStatus(row) {
    $('sideStatus').querySelectorAll('.status-pill').forEach(p => {
      p.classList.toggle('active', p.dataset.status === row.status);
    });
  }

  function renderComments(row, list) {
    const scroll = $('commentsScroll');
    if (!list.length) {
      scroll.innerHTML = `<div class="comments-empty">No feedback yet. Be the first.</div>`;
      return;
    }
    scroll.innerHTML = list.map(c => {
      const isOwn = currentUser && c.author_id === currentUser.id;
      const name = c.author_name || c.author_email || 'User';
      const initials = initialsOf(name);
      const color = colorForName(name);
      return `
        <div class="comment ${c.done?'done':''} ${isOwn?'own':''}" data-id="${c.id}">
          <input type="checkbox" class="comment-check" ${c.done?'checked':''}>
          <div class="avatar" style="background:${color}">${initials}</div>
          <div class="comment-body">
            <div class="comment-head"><span class="comment-name">${escapeHtml(name)}</span><span class="comment-time">${timeAgo(c.created_at)}</span></div>
            <div class="comment-text">${escapeHtml(c.body)}</div>
          </div>
          ${isOwn ? `<button class="comment-delete" title="Delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          </button>` : ''}
        </div>`;
    }).join('');

    scroll.querySelectorAll('.comment-check').forEach(cb => {
      cb.addEventListener('change', async (e) => {
        const id = e.target.closest('.comment').dataset.id;
        try {
          const updated = await api('/api/copy-review-comments', {
            method: 'PATCH', body: { id, done: e.target.checked }
          });
          const arr = dbComments[row.id];
          const idx = arr.findIndex(x => x.id === id);
          if (idx >= 0) arr[idx] = updated;
          updateFabCount(arr, row.status);
        } catch (err) { toast(err.message); e.target.checked = !e.target.checked; }
      });
    });

    scroll.querySelectorAll('.comment-delete').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.closest('.comment').dataset.id;
        if (!confirm('Delete this comment?')) return;
        try {
          await api('/api/copy-review-comments?id=' + id, { method: 'DELETE' });
          dbComments[row.id] = dbComments[row.id].filter(x => x.id !== id);
          renderComments(row, dbComments[row.id]);
          updateFabCount(dbComments[row.id], row.status);
        } catch (err) { toast(err.message); }
      });
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- EVENTS ----------
  function bindEvents() {
    $('prevBtn').addEventListener('click', async () => { if (currentIdx > 0) { currentIdx--; await renderShot(); } });
    $('nextBtn').addEventListener('click', async () => { if (currentIdx < currentFlow().shots.length - 1) { currentIdx++; await renderShot(); } });

    $('sideStatus').querySelectorAll('.status-pill').forEach(p => {
      p.addEventListener('click', async () => {
        const flow = currentFlow();
        const shot = currentShot();
        const key = `${flow.slug}/${shot.filename}`;
        const row = dbScreenshots[key];
        if (!row) return;
        const newStatus = p.dataset.status;
        if (row.status === newStatus) return;
        const prev = row.status;
        row.status = newStatus;
        renderStatus(row);
        renderFlowsNav();
        try {
          const updated = await api('/api/copy-review-screenshots', {
            method: 'PATCH', body: { id: row.id, status: newStatus }
          });
          dbScreenshots[key] = updated;
        } catch (err) {
          row.status = prev; renderStatus(row); renderFlowsNav();
          toast(err.message);
        }
      });
    });

    const ta = $('composerText');
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    });

    $('sendBtn').addEventListener('click', postComment);

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); postComment(); }
        return;
      }
      if (e.key === 'ArrowLeft') $('prevBtn').click();
      if (e.key === 'ArrowRight') $('nextBtn').click();
    });

    let touchX = null;
    $('stage').addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
    $('stage').addEventListener('touchend', e => {
      if (touchX === null) return;
      const dx = e.changedTouches[0].clientX - touchX;
      if (Math.abs(dx) > 50) (dx < 0 ? $('nextBtn') : $('prevBtn')).click();
      touchX = null;
    });

    $('phoneInner').addEventListener('click', () => {
      const shot = currentShot();
      if (!shot) return;
      $('lightboxImg').src = shot.url;
      $('lightbox').classList.add('show');
    });
    $('lightbox').addEventListener('click', () => $('lightbox').classList.remove('show'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') $('lightbox').classList.remove('show'); });

    $('logoutBtn').addEventListener('click', async () => {
      try { await fetch('/api/auth/logout', { method: 'POST' }); } catch {}
      window.location.href = '/login';
    });

    $('menuBtn').addEventListener('click', openDrawer);
    $('drawerBackdrop').addEventListener('click', () => { closeDrawer(); closeSheet(); });
    $('fabComments').addEventListener('click', openSheet);
    const closeHandler = (e) => { e.preventDefault(); e.stopPropagation(); closeSheet(); };
    $('sheetClose').addEventListener('click', closeHandler);
    $('sheetClose').addEventListener('touchend', closeHandler);
    $('sheetGrab').addEventListener('click', closeSheet);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeDrawer(); closeSheet(); }
    });
  }

  async function postComment() {
    const ta = $('composerText');
    const body = ta.value.trim();
    if (!body) return;
    const flow = currentFlow();
    const shot = currentShot();
    const row = dbScreenshots[`${flow.slug}/${shot.filename}`];
    if (!row) return;
    $('sendBtn').disabled = true;
    try {
      const created = await api('/api/copy-review-comments', {
        method: 'POST', body: { screenshot_id: row.id, body }
      });
      dbComments[row.id] = [...(dbComments[row.id]||[]), created];
      ta.value = ''; ta.style.height = 'auto';
      renderComments(row, dbComments[row.id]);
      updateFabCount(dbComments[row.id], row.status);
      $('commentsScroll').scrollTop = $('commentsScroll').scrollHeight;
    } catch (err) {
      toast(err.message);
    } finally {
      $('sendBtn').disabled = false;
    }
  }

  checkAuth();
})();
</script>
</body>
</html>
